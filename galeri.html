<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey - Devkia & Miftah</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #fdfaf6; /* Warna kertas krem/putih tulang (aesthetic) */
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #4a3728; /* Warna teks kopi gelap, lebih soft dari hitam */
            position: relative;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 500px;
            padding: 20px;
        }

        .header-title {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #8d6e63;
            opacity: 0;
            margin-bottom: 10px;
        }

        .divider {
            width: 0; height: 1px;
            background: #8d6e63;
            margin-bottom: 40px;
            opacity: 0;
        }

        .story-box {
            width: 100%;
            min-height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .type-text {
            font-size: 1.4rem; /* Lebih besar & readable */
            line-height: 1.6;
            font-weight: 400;
            font-style: italic;
            color: #5d4037;
            letter-spacing: 0.5px;
        }

        /* Gallery 6 Foto */
        .gallery-container {
            margin-top: 50px;
            width: 100%;
            height: 250px;
            position: relative;
            display: none;
        }

        .img-box {
            position: absolute; width: 140px; height: 180px;
            background: #fff; padding: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            opacity: 0;
        }

        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Posisi 6 foto (variasi rotasi) */
        .img1 { left: 0%; top: 0; transform: rotate(-5deg); }
        .img2 { left: 20%; top: 20px; transform: rotate(3deg); }
        .img3 { left: 40%; top: 0; transform: rotate(-2deg); }
        .img4 { left: 0%; top: 40px; transform: rotate(4deg); }
        .img5 { left: 20%; top: 60px; transform: rotate(-4deg); }
        .img6 { left: 40%; top: 40px; transform: rotate(2deg); }

        .btn-container { position: fixed; bottom: 50px; opacity: 0; z-index: 100; }
        .nav-btn {
            padding: 10px 40px; border: 1px solid #8d6e63;
            background: transparent; color: #8d6e63;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600; cursor: pointer; text-transform: uppercase;
            letter-spacing: 3px; font-size: 0.9rem;
            transition: 0.4s;
        }
        .nav-btn:hover { background: #8d6e63; color: white; }
    </style>
</head>
<body>

    <div class="content">
        <div class="header-title" id="title">Our Story</div>
        <div class="divider" id="divider"></div>

        <div class="story-box">
            <p class="type-text" id="typingTarget"></p>
        </div>

        <div class="gallery-container" id="gallery">
            <div class="img-box img1"><img src="gambar1.png"></div>
            <div class="img-box img2"><img src="gambar2.png"></div>
            <div class="img-box img3"><img src="gambar3.png"></div>
            <div class="img-box img4"><img src="gambar4.png"></div>
            <div class="img-box img5"><img src="gambar5.png"></div>
            <div class="img-box img6"><img src="gambar6.png"></div>
        </div>
    </div>

    <div class="btn-container" id="btnNext">
        <button class="nav-btn" onclick="next()">KIRIM DOA</button>
    </div>

    <script>
        gsap.registerPlugin(TextPlugin);

        const storyLines = [
            "Tak pernah ada dalam rencana kami untuk bertemu.",
            "Namun semesta punya cara indah untuk menyatukan dua hati.",
            "Banyak tawa, diskusi, dan doa yang kita lalui bersama.",
            "Hingga akhirnya kami sadar, kitalah rumah yang dicari.",
            "Perbedaan kini melengkapi, bukan lagi menjadi penghalang.",
            "Kini, kami mantap melangkah ke jenjang yang lebih suci.",
            "Mohon doakan kami agar selalu dalam ridha-Nya selamanya."
        ];

        const tl = gsap.timeline();

        tl.to("#title", { opacity: 1, duration: 1.5 })
          .to("#divider", { opacity: 1, width: 100, duration: 1 }, "-=0.5");

        storyLines.forEach((line) => {
            tl.to("#typingTarget", {
                duration: line.length * 0.05, 
                text: line,
                ease: "none"
            })
            .to({}, { duration: 2 }) 
            .to("#typingTarget", {
                opacity: 0,
                duration: 0.4,
                onComplete: () => {
                    document.getElementById("typingTarget").textContent = "";
                    gsap.set("#typingTarget", { opacity: 1 });
                }
            });
        });

        // Animasi Gallery 6 Foto
        tl.set("#gallery", { display: "block" })
          .to([".img1", ".img2", ".img3", ".img4", ".img5", ".img6"], { 
              opacity: 1, 
              stagger: 0.2, 
              duration: 0.8, 
              ease: "power2.out" 
          })
          .to("#btnNext", { opacity: 1, duration: 1 });

        function next() { window.location.href = "wish.html"; }
    </script>
</body>
</html>

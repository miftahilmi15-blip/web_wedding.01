<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Message - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&family=Amiri&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: radial-gradient(circle, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- 1. NAMA MANTUL (Ciri Khas Desain Bos) --- */
        .bounce-element {
            position: fixed; white-space: nowrap;
            font-family: 'Great Vibes', cursive;
            color: rgba(139, 94, 131, 0.4);
            font-size: 1.8rem; pointer-events: none; 
            z-index: 200;
        }

        /* --- 2. FRAME DASHBOARD (Presisi 320x550) --- */
        .frame-wrapper {
            position: relative; z-index: 20;
            opacity: 0; scale: 0.9;
        }
        .frame-container {
            width: 320px; height: 550px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px); border-radius: 40px;
            display: flex; flex-direction: column; 
            padding: 40px 25px; align-items: center; /* Padding disesuaikan */
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        /* Teks Arab */
        .arabic {
            font-family: 'Amiri', serif;
            font-size: 1.45rem; color: #8b5e83; 
            line-height: 2.3; text-align: center;
            margin-top: 30px; min-height: 120px;
        }

        /* Teks Artinya (Efek Ngetik) */
        .artinya {
            font-size: 0.85rem; color: #8b5e83;
            line-height: 1.8; text-align: center;
            font-style: italic; margin-top: 30px;
            min-height: 100px; /* Biar ngetik ga goyang */
        }

        /* TOMBOL NEXT */
        .btn-next {
            margin-top: auto; padding: 12px 40px; background: #8b5e83;
            color: white; border: none; border-radius: 50px; font-weight: 600;
            cursor: pointer; width: 100%; transition: 0.3s;
        }
        .btn-next:hover { background: #a6759c; }
    </style>
</head>
<body>

    <div id="bounce1" class="bounce-element">Samira 🌸</div>
    <div id="bounce2" class="bounce-element">Murad 🌺</div>

    <div class="frame-wrapper" id="main-frame">
        <div class="frame-container">
            <p style="letter-spacing: 4px; font-size: 0.7rem; color: #8b5e83; font-weight: 600;">AR-RUM 21</p>
            
            <div class="arabic" id="txtArab">
                وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا لِّتَسْكُنُوا إِلَيْهَا
            </div>

            <div class="artinya" id="typewriter"></div>

            <button class="btn-next" onclick="window.location.href='mempelai.html'">NEXT CHAPTER 🩷</button>
        </div>
    </div>

    <script>
        gsap.registerPlugin(TextPlugin);

        function createBounce(id) {
            const el = document.getElementById(id);
            let pos = { x: Math.random() * (window.innerWidth - 100), y: Math.random() * (window.innerHeight - 50) };
            let vel = { x: 2, y: 2 };
            function update() {
                pos.x += vel.x; pos.y += vel.y;
                if (pos.x <= 0 || pos.x + el.offsetWidth >= window.innerWidth) vel.x *= -1;
                if (pos.y <= 0 || pos.y + el.offsetHeight >= window.innerHeight) vel.y *= -1;
                el.style.left = pos.x + 'px'; el.style.top = pos.y + 'px';
                requestAnimationFrame(update);
            }
            update();
        }

        window.onload = () => {
            const tl = gsap.timeline();
            
            // Frame Masuk
            tl.to("#main-frame", { opacity: 1, scale: 1, duration: 1, ease: "back.out(1.2)" });
            
            // Efek Ngetik
            tl.to("#typewriter", {
                duration: 4,
                text: "“Dan di antara tanda-tanda kebesaran-Nya ialah Dia menciptakan pasangan untukmu agar kamu merasa tenteram kepadanya...”",
                ease: "none"
            }, "-=0.3");

            createBounce('bounce1');
            createBounce('bounce2');
        };
    </script>
</body>
</html>

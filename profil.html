<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groom & Bride - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: radial-gradient(circle, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- 1. NAMA MANTUL (DNA KHAS BOS) --- */
        .bounce-element {
            position: fixed; white-space: nowrap;
            font-family: 'Great Vibes', cursive;
            color: rgba(139, 94, 131, 0.5); /* Pink tegas tapi transparan */
            font-size: 1.8rem; pointer-events: none; 
            z-index: 200; /* Di depan dashboard */
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.5);
        }

        /* --- 2. FRAME DASHBOARD --- */
        .frame-wrapper {
            position: relative; z-index: 20;
            opacity: 0; scale: 0.9;
        }
        .frame-container {
            width: 320px; height: 560px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px); border-radius: 40px;
            display: flex; flex-direction: column; 
            padding: 25px; align-items: center;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .title-top {
            letter-spacing: 4px; font-size: 0.7rem; 
            color: #8b5e83; font-weight: 600; margin-bottom: 20px;
        }

        /* --- 3. PROFIL BOX (KOTAK RAPI, ANTI BULAT) --- */
        .profile-section {
            width: 100%; text-align: center;
        }

        .img-profile {
            width: 110px; height: 110px;
            border-radius: 20px; /* Kotak tumpul elegan */
            object-fit: cover;
            border: 2px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }

        .name-mempelai {
            font-family: 'Great Vibes', cursive;
            font-size: 2rem; color: #8b5e83;
        }

        .sub-text {
            font-size: 0.65rem; color: #666; line-height: 1.5;
            margin-top: 5px;
        }

        .divider {
            font-family: 'Great Vibes', cursive;
            font-size: 1.8rem; color: #d4af37;
            margin: 10px 0;
        }

        /* TOMBOL PINDAH HALAMAN */
        .btn-next {
            margin-top: auto; width: 100%; padding: 14px;
            background: #8b5e83; color: white;
            border: none; border-radius: 20px;
            font-weight: 700; cursor: pointer;
            box-shadow: 0 8px 20px rgba(139, 94, 131, 0.3);
            transition: 0.3s;
        }
        .btn-next:active { scale: 0.95; }
    </style>
</head>
<body>

    <div id="bounce1" class="bounce-element">Samira 🌸</div>
    <div id="bounce2" class="bounce-element">Murad 🌺</div>

    <div class="frame-wrapper" id="main-frame">
        <div class="frame-container">
            <p class="title-top">THE PROFILES</p>

            <div class="profile-section">
                <img src="https://images.unsplash.com/photo-1594744803329-a584af1cae24?q=80&w=200" class="img-profile">
                <h2 class="name-mempelai">Samira Putri</h2>
                <p class="sub-text">Putri dari Bapak Fulan <br> & Ibu Fulanah</p>
            </div>

            <div class="divider">&</div>

            <div class="profile-section">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=200" class="img-profile">
                <h2 class="name-mempelai">Murad Al-Fatih</h2>
                <p class="sub-text">Putra dari Bapak Fulan <br> & Ibu Fulanah</p>
            </div>

            <button class="btn-next" onclick="nextPage()">SAVE THE DATE 📅</button>
        </div>
    </div>

    <script>
        // 1. FUNGSI MANTUL (BOUNCE)
        function initBounce(id) {
            const el = document.getElementById(id);
            let pos = { x: Math.random() * (window.innerWidth - 100), y: Math.random() * (window.innerHeight - 50) };
            let vel = { x: 2, y: 2 };

            function animate() {
                pos.x += vel.x;
                pos.y += vel.y;

                if (pos.x <= 0 || pos.x + el.offsetWidth >= window.innerWidth) vel.x *= -1;
                if (pos.y <= 0 || pos.y + el.offsetHeight >= window.innerHeight) vel.y *= -1;

                el.style.left = pos.x + 'px';
                el.style.top = pos.y + 'px';
                requestAnimationFrame(animate);
            }
            animate();
        }

        window.onload = () => {
            // Animasi Frame Masuk
            gsap.to("#main-frame", { opacity: 1, scale: 1, duration: 1.5, ease: "back.out(1.2)" });
            
            // Jalankan Mantul
            initBounce('bounce1');
            initBounce('bounce2');
        };

        function nextPage() {
            gsap.to("#main-frame", { opacity: 0, x: -50, duration: 0.8 });
            setTimeout(() => {
                window.location.href = "acara.html";
            }, 800);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Papan Ucapan Ribuan Doa</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #fce4ec; 
            font-family: 'Montserrat', sans-serif; 
            color: #8b5e83; 
            height: 100vh; 
            height: -webkit-fill-available;
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        header { 
            padding: 20px 10px; 
            text-align: center; 
            background: rgba(255,255,255,0.85); 
            backdrop-filter: blur(10px); 
            z-index: 100; 
            border-bottom: 1px solid rgba(255,255,255,0.5);
            flex-shrink: 0;
        }

        h1 { font-family: 'Great Vibes', cursive; font-size: 2.2rem; color: #ad1457; }
        
        .marquee-container { 
            flex: 1; 
            position: relative; 
            overflow: hidden; 
            width: 100%; 
            /* Fade effect */
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }
        
        .scroll-content { 
            position: absolute; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 20px; /* Jarak aman dari atas */
            padding-bottom: 50px;
        }
        
        .wish-card { 
            width: 88%; 
            max-width: 400px; 
            background: rgba(255, 255, 255, 0.85); 
            padding: 18px; 
            margin-bottom: 15px; 
            border-radius: 20px; 
            box-shadow: 0 8px 20px rgba(139, 94, 131, 0.06); 
            border: 1px solid white;
        }
        
        .guest-name { font-weight: 700; color: #ad1457; font-size: 0.9rem; display: block; margin-bottom: 5px; }
        .message { font-size: 0.85rem; line-height: 1.5; font-style: italic; color: #6d4c67; }
        
        .footer-nav { 
            padding: 20px 10px 30px 10px; /* Tambah padding bawah untuk safety area HP */
            text-align: center; 
            background: rgba(255, 255, 255, 0.9); 
            z-index: 100; 
            border-top: 1px solid #fce4ec;
            flex-shrink: 0;
        }
        
        .btn-back { 
            display: inline-block;
            padding: 12px 45px; 
            background: #ad1457; 
            color: white; 
            border-radius: 50px; 
            text-decoration: none; 
            font-size: 0.85rem; 
            font-weight: 600; 
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(173, 20, 87, 0.2);
        }
    </style>
</head>
<body>

    <header>
        <h1>Ribuan Doa Restu</h1>
        <p style="font-size: 0.6rem; letter-spacing: 1px; color: #ad1457; font-weight: 600; opacity: 0.8;">TERIMA KASIH ATAS DOA ANDA</p>
    </header>

    <div class="marquee-container" id="marquee">
        <div class="scroll-content" id="content">
            <!-- Data Doa -->
        </div>
    </div>

    <div class="footer-nav">
        <a href="index.html" class="btn-back">KEMBALI KE DEPAN</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://wedding-4646f-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const content = document.getElementById('content');
        const marquee = document.getElementById('marquee');
        const wishesRef = ref(db, 'ucapan');

        let currentPos = 10; // Start sedikit di bawah header
        let isMoving = true;

        onValue(wishesRef, (snapshot) => {
            const data = snapshot.val();
            content.innerHTML = ""; 

            if (data) {
                Object.values(data).forEach(item => {
                    content.innerHTML += `
                        <div class="wish-card">
                            <span class="guest-name">♥ ${item.nama}</span>
                            <p class="message">"${item.pesan}"</p>
                        </div>
                    `;
                });
            } else {
                content.innerHTML = "<p style='text-align:center; margin-top: 50px; font-size:0.8rem;'>Menunggu kiriman doa...</p>";
            }
        });

        function animateScroll() {
            if (isMoving) {
                currentPos -= 0.6; 
                
                // Jika sudah hilang semua ke atas, muncul lagi dari bawah container
                if (currentPos < -(content.offsetHeight)) {
                    currentPos = marquee.offsetHeight; 
                }
                
                content.style.transform = `translateY(${currentPos}px)`;
            }
            requestAnimationFrame(animateScroll);
        }

        animateScroll();

        // Control
        marquee.addEventListener('touchstart', () => { isMoving = false; });
        marquee.addEventListener('touchend', () => { isMoving = true; });
        marquee.addEventListener('mouseenter', () => { isMoving = false; });
        marquee.addEventListener('mouseleave', () => { isMoving = true; });
    </script>
</body>
</html>

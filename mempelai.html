<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Couple - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Amiri&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #fce4ec; 
            background-image: radial-gradient(#f8bbd0 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            font-family: 'Montserrat', sans-serif; 
            text-align: center; 
            color: #8b5e83; 
            overflow-x: hidden;
            padding-bottom: 150px;
            /* Tambahan untuk 3D */
            perspective: 1200px;
        }

        .decoration {
            position: fixed; width: 150px; opacity: 0.4; z-index: -1;
            pointer-events: none;
        }
        .top-left { top: -20px; left: -20px; transform: rotate(90deg); }
        .bottom-right { bottom: 80px; right: -20px; transform: rotate(-90deg); }

        /* Scene wrapper untuk handle rotasi 3D */
        .scene {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-style: preserve-3d;
        }

        .profile-card { 
            margin: 60px auto; 
            opacity: 0; 
            transform: translateY(40px) translateZ(0);
            position: relative;
            transform-style: preserve-3d; /* Agar anak elemen bisa 3D */
            width: 90%;
            max-width: 350px;
        }

        .photo-wrapper {
            position: relative;
            width: 180px; height: 180px; margin: 0 auto 25px auto;
            opacity: 0; scale: 0.5;
            transform-style: preserve-3d;
        }
        
        .photo-frame {
            position: absolute; top: -10px; left: -10px;
            width: 200px; height: 200px;
            border: 2px solid #ec407a; border-radius: 50%;
            border-style: double; opacity: 0.5;
            animation: rotateFrame 10s linear infinite;
            transform: translateZ(-20px); /* Berada di belakang foto */
        }

        @keyframes rotateFrame { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .photo { 
            width: 100%; height: 100%; 
            border-radius: 50%; object-fit: cover; 
            border: 5px solid #fff;
            box-shadow: 0 15px 35px rgba(139, 94, 131, 0.2);
            transform: translateZ(30px); /* Menjorok ke depan */
        }

        h2 { 
            font-family: 'Great Vibes', cursive; 
            font-size: 3rem; margin: 15px 0 10px 0; 
            color: #ad1457;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.5);
            transform: translateZ(50px); /* Lebih depan lagi */
        }

        .line-deco {
            width: 50px; height: 2px; background: #ec407a; margin: 10px auto;
            opacity: 0.5;
            transform: translateZ(20px);
        }

        .parent-info { 
            font-size: 0.85rem; font-weight: 400; color: #6d4c67; 
            line-height: 1.6; letter-spacing: 0.5px;
            transform: translateZ(20px);
        }

        .ampersand { 
            font-family: 'Great Vibes', cursive; 
            font-size: 3.5rem; margin: 30px 0; 
            color: #ec407a; opacity: 0; 
            position: relative;
            transform: translateZ(80px); /* Paling depan */
        }
        .ampersand::before, .ampersand::after {
            content: '————'; font-size: 0.8rem; vertical-align: middle; 
            margin: 0 15px; opacity: 0.3;
        }

        .btn-event-wrapper {
            position: fixed; bottom: 0; left: 0; width: 100%; padding: 30px 0;
            background: linear-gradient(to top, #fce4ec 80%, rgba(252, 228, 236, 0)); 
            z-index: 100;
        }
        .btn-event {
            padding: 18px 50px; background: #ec407a; color: white;
            border-radius: 50px; border: none; font-weight: 700;
            box-shadow: 0 10px 25px rgba(236, 64, 122, 0.4); 
            cursor: pointer; letter-spacing: 1px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="decoration top-left">🌸</div>
    <div class="decoration bottom-right">🌸</div>

    <audio id="weddingAudio" loop>
        <source src="rum.mp3" type="audio/mpeg">
    </audio>

    <div class="scene" id="mainScene">
        <div class="profile-card" id="p1">
            <div class="photo-wrapper" id="pw1">
                <div class="photo-frame"></div>
                <img src="samira.png" class="photo" alt="Samira">
            </div>
            <h2>Samira Putri</h2>
            <div class="line-deco"></div>
            <p class="parent-info">Putri tercinta dari<br><b>Bpk. Fulan</b> & <b>Ibu Fulanah</b></p>
        </div>

        <div class="ampersand" id="amp">&</div>

        <div class="profile-card" id="p2">
            <div class="photo-wrapper" id="pw2">
                <div class="photo-frame"></div>
                <img src="murad.png" class="photo" alt="Murad">
            </div>
            <h2>Murad Al-Fatih</h2>
            <div class="line-deco"></div>
            <p class="parent-info">Putra tercinta dari<br><b>Bpk. John</b> & <b>Ibu Doe</b></p>
        </div>
    </div>

    <div class="btn-event-wrapper">
        <button class="btn-event" onclick="next()">LIHAT JADWAL ACARA</button>
    </div>

    <script>
        window.onload = () => {
            const audio = document.getElementById('weddingAudio');
            const startPlay = () => { audio.play().catch(() => {}); };
            window.addEventListener('click', startPlay, { once: true });
            window.addEventListener('touchstart', startPlay, { once: true });

            const tl = gsap.timeline();

            // Animasi Masuk Gaya Cinematic 3D
            tl.to("#p1", { opacity: 1, y: 0, rotationX: 0, duration: 1.5, ease: "power4.out" })
              .to("#pw1", { opacity: 1, scale: 1, duration: 1, ease: "back.out(1.7)" }, "-=1")
              .to("#amp", { opacity: 1, scale: 1.2, duration: 0.8, ease: "elastic.out(1, 0.5)" }, "-=0.5")
              .to("#p2", { opacity: 1, y: 0, rotationX: 0, duration: 1.5, ease: "power4.out" }, "-=0.8")
              .to("#pw2", { opacity: 1, scale: 1, duration: 1, ease: "back.out(1.7)" }, "-=1");

            // Efek Interaksi 3D (Tilt) saat Mouse Bergerak atau Touch
            const scene = document.getElementById('mainScene');
            
            const handleMove = (e) => {
                const xVal = e.clientX || e.touches[0].clientX;
                const yVal = e.clientY || e.touches[0].clientY;
                
                const moveX = (window.innerWidth / 2 - xVal) / 20;
                const moveY = (window.innerHeight / 2 - yVal) / 20;

                gsap.to(scene, {
                    rotationY: -moveX,
                    rotationX: moveY,
                    duration: 1,
                    ease: "power2.out"
                });
            };

            window.addEventListener('mousemove', handleMove);
            window.addEventListener('touchmove', handleMove);

            // Floating effect tetap ada
            gsap.to(".profile-card", {
                z: 10,
                duration: 2,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut"
            });
        };

        function next() {
            gsap.to("body", { opacity: 0, duration: 0.8 });
            setTimeout(() => { window.location.href = "acara.html"; }, 800);
        }
    </script>
</body>
</html>

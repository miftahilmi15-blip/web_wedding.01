<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Invitation - Devkia & Miftah</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #fce4ec; 
            background-image: radial-gradient(circle at center, #fff 0%, #f8bbd0 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }
        .main-wrapper { position: relative; width: 320px; height: 520px; z-index: 20; display: flex; justify-content: center; align-items: center; }
        .frame-container { 
            width: 100%; height: 100%; background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(25px); border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.5); 
            display: flex; flex-direction: column; justify-content: space-evenly; align-items: center;
            padding: 30px 25px; box-shadow: 0 30px 60px rgba(139, 94, 131, 0.15); text-align: center;
        }
        .couple-name { font-family: 'Great Vibes', cursive; color: #ad1457; font-size: 3rem; line-height: 1.1; }
        .btn-buka {
            padding: 14px 35px; background: linear-gradient(45deg, #ec407a, #ad1457);
            color: white; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; 
            transition: 0.4s; box-shadow: 0 10px 25px rgba(236, 64, 122, 0.3);
            text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; margin-top: 20px;
        }
        #storm-layer { position: fixed; inset: 0; z-index: 9999; pointer-events: none; display: none; }
    </style>
</head>
<body>

    <div id="storm-layer"></div>

    <div class="main-wrapper">
        <div class="frame-container">
            <div>
                <p style="letter-spacing: 6px; font-size: 0.7rem; color: #ad1457; font-weight: 900;">THE WEDDING OF</p>
                <h1 class="couple-name">Devkia<br>&<br>Miftah</h1>
            </div>
            
            <div class="guest-section">
                <p style="font-size: 0.8rem; color: #6d4c67; margin-bottom: 5px;">Kepada Yth:</p>
                <h2 style="font-family: 'Great Vibes', cursive; color: #ad1457; font-size: 2.4rem;" id="nama-tamu">Tamu Undangan</h2>
                <button class="btn-buka" onclick="bukaUndangan()">Buka Undangan</button>
            </div>
        </div>
    </div>

    <script>
        // Tangkap nama tamu
        const params = new URLSearchParams(window.location.search);
        const nama = params.get('to');
        if (nama) document.getElementById('nama-tamu').innerText = decodeURIComponent(nama);

        function bukaUndangan() {
            // Efek transisi simpel
            gsap.to(".main-wrapper", { opacity: 0, scale: 1.2, duration: 0.8, ease: "power2.in", onComplete: () => {
                // Pindah halaman dengan cara standar (paling anti-error)
                window.location.href = "profil.html"; 
            }});
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Schedule - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #fce4ec; 
            background-image: radial-gradient(circle at center, #fff 0%, #f8bbd0 100%);
            font-family: 'Montserrat', sans-serif; 
            height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            perspective: 2000px;
        }

        /* --- EFEK BUNGA JATUH --- */
        .falling-flower {
            position: fixed; top: -10%;
            pointer-events: none; z-index: 5;
            opacity: 0.6;
            user-select: none;
        }

        .scene {
            width: 100%; display: flex; flex-direction: column;
            align-items: center; transform-style: preserve-3d;
            padding-bottom: 120px; z-index: 10;
            will-change: transform;
        }

        .card { 
            width: 88%; max-width: 340px; 
            background: rgba(255, 255, 255, 0.3); 
            backdrop-filter: blur(25px); 
            border-radius: 40px; 
            border: 1.5px solid rgba(236, 64, 122, 0.2); 
            padding: 40px 25px; margin: 12px 0;
            position: relative; transform-style: preserve-3d;
            opacity: 0; box-shadow: 0 30px 60px rgba(139, 94, 131, 0.1);
        }

        /* Kilatan cahaya pada kartu */
        .card::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(125deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
            background-size: 200% 200%;
            animation: shine 5s infinite;
            border-radius: 40px; pointer-events: none;
        }

        @keyframes shine {
            0% { background-position: -200% -200%; }
            100% { background-position: 200% 200%; }
        }

        h2 { 
            font-family: 'Great Vibes', cursive; 
            font-size: 2.6rem; color: #ad1457; 
            margin-bottom: 20px; transform: translateZ(70px);
            text-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .info-item {
            margin: 12px 0; font-size: 0.85rem; color: #6d4c67;
            transform: translateZ(40px); letter-spacing: 0.5px;
        }
        .info-item b { color: #ec407a; font-weight: 600; }

        .btn-maps { 
            display: inline-block; padding: 12px 30px; 
            background: linear-gradient(45deg, #ec407a, #ad1457);
            color: white; text-decoration: none; border-radius: 50px; 
            font-size: 0.75rem; font-weight: 700; margin-top: 20px;
            transform: translateZ(90px);
            box-shadow: 0 10px 20px rgba(236, 64, 122, 0.3);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .nav-container {
            position: fixed; bottom: 40px; width: 100%;
            display: flex; justify-content: center; z-index: 1000;
        }

        .nav-btn { 
            padding: 16px 45px; 
            background: linear-gradient(45deg, #ad1457, #ec407a); 
            color: white; border: none; border-radius: 50px; 
            font-weight: 700; cursor: pointer; 
            box-shadow: 0 10px 30px rgba(173, 20, 87, 0.3);
            letter-spacing: 1.5px; font-size: 0.8rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="scene" id="cardScene">
        <div class="card" id="card1">
            <h2>Akad Nikah</h2>
            <div class="info-item">📅 <b>Minggu, 17 Mei 2026</b></div>
            <div class="info-item">⏰ <b>08.00 - 10.00 WIB</b></div>
            <div class="info-item">📍 <b>Masjid Agung Al-Barakah</b></div>
        </div>

        <div class="card" id="card2">
            <h2>Resepsi</h2>
            <div class="info-item">📅 <b>Minggu, 17 Mei 2026</b></div>
            <div class="info-item">⏰ <b>11.00 - Selesai</b></div>
            <div class="info-item">📍 <b>Grand Ballroom Mulia</b></div>
            <a href="https://maps.google.com" class="btn-maps">Petunjuk Lokasi 📍</a>
        </div>
    </div>

    <div class="nav-container">
        <button class="nav-btn" onclick="next()">LIHAT MOMENT KAMI 📸</button>
    </div>

    <script>
        // --- LOGIKA BUNGA JATUH ---
        function createFlower() {
            const flowers = ['🌸', '🌺', '🌹', '🍃', '✨'];
            const f = document.createElement('div');
            f.className = 'falling-flower';
            f.innerText = flowers[Math.floor(Math.random() * flowers.length)];
            f.style.left = Math.random() * 100 + 'vw';
            f.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
            document.body.appendChild(f);

            gsap.to(f, {
                y: window.innerHeight + 100,
                x: `+=${Math.random() * 200 - 100}`,
                rotation: Math.random() * 720,
                duration: Math.random() * 5 + 5,
                ease: "none",
                onComplete: () => f.remove()
            });
        }
        setInterval(createFlower, 400);

        window.onload = () => {
            const tl = gsap.timeline();
            tl.to(".card", { 
                opacity: 1, y: 0, duration: 1.5, stagger: 0.4, ease: "power4.out" 
            });

            const scene = document.getElementById('cardScene');
            
            const handleMove = (e) => {
                const xVal = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                const yVal = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                
                const moveY = (window.innerWidth / 2 - xVal) / 15;
                const moveX = (yVal - window.innerHeight / 2) / 15;

                gsap.to(scene, {
                    rotationY: moveY,
                    rotationX: moveX,
                    duration: 1,
                    ease: "power2.out"
                });
            };

            window.addEventListener('mousemove', handleMove);
            window.addEventListener('touchmove', (e) => handleMove(e));
        };

        function next() {
            gsap.to("body", { opacity: 0, scale: 1.2, duration: 0.8 });
            setTimeout(() => { window.location.href = "galeri.html"; }, 800);
        }
    </script>
</body>
</html>        }
    </script>
</body>
</html>

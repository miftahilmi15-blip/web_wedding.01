<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- KUNCI ZOOM 1: Meta tag diperketat -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Luxury Wedding - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            /* KUNCI ZOOM 2: Mencegah seleksi teks dan highlight saat disentuh */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body { 
            background: #fce4ec; 
            background-image: radial-gradient(circle at center, #fff 0%, #f8bbd0 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden;
            height: 100vh;
            perspective: 1500px;
            /* KUNCI ZOOM 3: Mematikan gesture browser bawaan */
            touch-action: none;
        }

        .particle {
            position: fixed; background: rgba(236, 64, 122, 0.15);
            border-radius: 50%; pointer-events: none; z-index: 0;
            will-change: transform;
            animation: floatParticle 10s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -50px); }
            66% { transform: translate(-20px, 20px); }
        }

        .scene {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transform-style: preserve-3d;
            will-change: transform;
            padding-bottom: 80px;
        }

        .profile-card { 
            margin: 10px auto; 
            opacity: 0; 
            position: relative;
            transform-style: preserve-3d;
            width: 85%; max-width: 300px;
            background: rgba(255, 255, 255, 0.4); 
            padding: 20px; border-radius: 35px;
            backdrop-filter: blur(6px); 
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 30px 60px rgba(139, 94, 131, 0.1);
        }

        .photo-wrapper {
            position: relative;
            width: 120px; height: 120px; margin: 0 auto 15px auto;
            transform-style: preserve-3d;
        }
        
        .photo-frame {
            position: absolute; top: -8px; left: -8px;
            width: 136px; height: 136px;
            border: 2px solid #ec407a; border-radius: 50%;
            border-style: double; opacity: 0.3;
            animation: rotateFrame 20s linear infinite;
            transform: translateZ(-30px);
        }

        @keyframes rotateFrame { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .photo { 
            width: 100%; height: 100%; 
            border-radius: 50%; object-fit: cover; 
            border: 4px solid #fff;
            transform: translateZ(80px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        h2 { 
            font-family: 'Great Vibes', cursive; 
            font-size: 2.4rem; margin: 5px 0; 
            color: #ad1457;
            transform: translateZ(100px);
        }

        .parent-info { 
            font-size: 0.7rem; font-weight: 400; color: #6d4c67; 
            line-height: 1.4; transform: translateZ(50px);
        }

        .ampersand { 
            font-family: 'Great Vibes', cursive; 
            font-size: 3rem; color: #ec407a; 
            margin: 2px 0;
            transform: translateZ(130px);
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 30px 0;
            background: linear-gradient(to top, #fce4ec 60%, transparent);
            z-index: 1000;
            display: flex; justify-content: center;
        }

        .btn-event {
            padding: 14px 40px; background: #ec407a; color: white;
            border-radius: 50px; border: none; font-weight: 700;
            box-shadow: 0 10px 25px rgba(236, 64, 122, 0.3); 
            cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; font-size: 0.75rem;
        }

        @media (max-height: 700px) {
            .profile-card { padding: 15px; max-width: 260px; }
            .photo-wrapper { width: 100px; height: 100px; }
            .photo-frame { width: 116px; height: 116px; }
            h2 { font-size: 2rem; }
        }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- Bonus: Matikan klik kanan -->

    <script>
        // KUNCI ZOOM 4: Blokir Pinch Zoom lewat JS (Untuk Safari Mobile)
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('gesturestart', (e) => {
            e.preventDefault();
        });

        const particleCount = 12;
        for (let i = 0; i < particleCount; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            let size = Math.random() * 5 + 2;
            p.style.width = size + 'px'; 
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            p.style.animationDelay = (Math.random() * 5) + 's';
            document.body.appendChild(p);
        }
    </script>

    <div class="scene" id="mainScene">
        <div class="profile-card" id="p1">
            <div class="photo-wrapper">
                <div class="photo-frame"></div>
                <img src="samira.png" class="photo" alt="Samira">
            </div>
            <h2>Samira Putri</h2>
            <p class="parent-info">Putri tercinta dari<br><b>Bpk. Fulan</b> & <b>Ibu Fulanah</b></p>
        </div>

        <div class="ampersand">&</div>

        <div class="profile-card" id="p2">
            <div class="photo-wrapper">
                <div class="photo-frame"></div>
                <img src="murad.png" class="photo" alt="Murad">
            </div>
            <h2>Murad Al-Fatih</h2>
            <p class="parent-info">Putra tercinta dari<br><b>Bpk. John</b> & <b>Ibu Doe</b></p>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="btn-event" onclick="next()">LIHAT JADWAL ACARA</button>
    </div>

    <script>
        window.onload = () => {
            const tl = gsap.timeline();
            tl.to(".profile-card", { opacity: 1, duration: 1.2, stagger: 0.3, ease: "power3.out" })
              .from(".photo", { z: 300, opacity: 0, duration: 1, stagger: 0.3, ease: "back.out(1.7)" }, "-=0.8");

            const scene = document.getElementById('mainScene');
            let ticking = false;

            const handleMove = (e) => {
                if (!ticking) {
                    window.requestAnimationFrame(() => {
                        const xVal = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                        const yVal = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                        
                        const rotateY = (window.innerWidth / 2 - xVal) / 15; 
                        const rotateX = (yVal - window.innerHeight / 2) / 15;

                        gsap.to(scene, {
                            rotationY: rotateY, rotationX: rotateX,
                            duration: 0.8, ease: "power2.out"
                        });
                        ticking = false;
                    });
                    ticking = true;
                }
            };

            // Pasang listener mouse dan touch
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('touchmove', handleMove, { passive: false });
        };

        function next() {
            gsap.to("body", { opacity: 0, scale: 1.05, duration: 0.5, onComplete: () => {
                window.location.href = "acara.html";
            }});
        }
    </script>
</body>
</html>

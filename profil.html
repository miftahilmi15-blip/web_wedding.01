<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Message - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Amiri&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            /* Background luar: Pink gelap ke Rose Gold Deep */
            background: radial-gradient(circle at center, #f8bbd0 0%, #ad1457 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- FRAME DASHBOARD TETAP ADA (Diskusi Awal) --- */
        .frame-wrapper {
            position: relative; z-index: 20;
            opacity: 0; scale: 0.9;
        }
        .frame-container {
            width: 320px; height: 580px;
            /* Glassmorphism Pink Mewah */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px); border-radius: 40px;
            display: flex; flex-direction: column; 
            padding: 30px 20px; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }

        /* Teks Arab: Emas Rose */
        .arabic {
            font-family: 'Amiri', serif;
            font-size: 1.45rem; color: #fff; 
            line-height: 2.3; text-align: center;
            margin-top: 15px; min-height: 110px;
            text-shadow: 0 0 10px rgba(255,255,255,0.4);
        }

        /* Teks Artinya: Putih Soft */
        .artinya {
            font-size: 0.8rem; color: #fff;
            line-height: 1.6; text-align: center;
            font-style: italic; margin-top: 10px;
            min-height: 70px; opacity: 0.9;
        }

        /* --- GAMBAR BULET FRAMELESS (Ghosty Effect) --- */
        .img-wrapper {
            margin: 25px auto; width: 170px; height: 170px;
            position: relative; opacity: 0;
        }
        .gate-img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover;
            /* Efek menyatu dengan background dashboard */
            -webkit-mask-image: radial-gradient(circle, black 40%, transparent 95%);
            mask-image: radial-gradient(circle, black 40%, transparent 95%);
        }

        .text-kepo {
            margin-top: auto; font-size: 0.7rem; color: #fff;
            letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.6;
        }

        /* TOMBOL PINK LUXE */
        .btn-next {
            width: 100%; margin-top: 15px; padding: 14px;
            background: #fff; color: #ad1457;
            border: none; border-radius: 20px;
            font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .btn-next:active { scale: 0.95; }
    </style>
</head>
<body>

    <div class="frame-wrapper" id="main-frame">
        <div class="frame-container">
            <p style="letter-spacing: 3px; font-size: 0.6rem; color: #fff; opacity: 0.8;">SURAH AR-RUM 21</p>
            
            <div class="arabic" id="txtArab">
                وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا
            </div>

            <div class="artinya" id="typewriter"></div>

            <div class="img-wrapper" id="imgBox">
                <img src="https://images.unsplash.com/photo-1523438885200-e635ba2c371e?q=80&w=500" class="gate-img">
            </div>

            <p class="text-kepo">Ready for the next step?</p>
            <button class="btn-next" onclick="nextPage()">BUKA SELANJUTNYA 🩷</button>
        </div>
    </div>

    <script>
        gsap.registerPlugin(TextPlugin);

        window.onload = () => {
            const tl = gsap.timeline();

            // Masuknya Frame
            tl.to("#main-frame", { opacity: 1, scale: 1, duration: 1.2, ease: "power4.out" });

            // Teks Arab Muncul
            tl.from("#txtArab", { opacity: 0, y: 15, duration: 1 });

            // Efek Ngetik (Typewriter)
            tl.to("#typewriter", {
                duration: 3.5,
                text: "“Dan di antara tanda-tanda-Nya ialah Dia menciptakan pasangan untukmu agar kamu merasa tenteram...”",
                ease: "none"
            }, "-=0.3");

            // Gambar Bulet Muncul (Frameless)
            tl.to("#imgBox", { opacity: 1, scale: 1.1, duration: 2 }, "-=1");

            // Efek Napas (Pulse) buat Gambar Bulet
            gsap.to("#imgBox", {
                scale: 1.15,
                duration: 2,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut"
            });
        };

        function nextPage() {
            gsap.to("#main-frame", { opacity: 0, y: -100, duration: 0.8, ease: "power2.in" });
            setTimeout(() => {
                window.location.href = "mempelai.html";
            }, 800);
        }
    </script>
</body>
</html>

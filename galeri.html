<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey - Devkia & Miftah</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,500&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* Pink Gradient Aesthetic */
            background: linear-gradient(180deg, #fff0f6 0%, #ffdeeb 100%);
            font-family: 'Cormorant Gramond', serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ad1457;
            position: relative;
        }

        /* Sparkle Lembut */
        .sparkles { position: absolute; inset: 0; pointer-events: none; }
        .sparkles span {
            position: absolute; width: 4px; height: 4px; border-radius: 50%;
            background: #fff; opacity: 0.8; animation: float 10s infinite;
        }
        @keyframes float { 
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .header-title {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            opacity: 0;
            margin-bottom: 5px;
        }

        .divider {
            width: 0; height: 1.5px;
            background: #ad1457;
            margin-bottom: 30px;
            opacity: 0;
        }

        /* Box Cerita */
        .story-box {
            width: 85%;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .type-text {
            font-size: 1.25rem;
            line-height: 1.5;
            font-style: italic;
            font-weight: 500;
        }

        /* Gallery - Foto Satu per Satu */
        .gallery-container {
            width: 100%;
            height: 260px;
            position: relative;
            margin-top: 10px;
        }

        .img-box {
            position: absolute;
            width: 180px;
            height: 230px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 8px 8px 35px;
            box-shadow: 0 10px 30px rgba(173, 20, 87, 0.2);
            border-radius: 2px;
            opacity: 0;
            z-index: 1;
        }

        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .img-box::after {
            content: "♥";
            position: absolute; bottom: 8px; left: 0; width: 100%;
            text-align: center; color: #ad1457; font-size: 1.2rem;
        }

        .btn-container { position: fixed; bottom: 50px; opacity: 0; }
        .nav-btn {
            padding: 12px 40px; border: 1.5px solid #ad1457;
            background: white; color: #ad1457;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700; cursor: pointer; text-transform: uppercase;
            letter-spacing: 3px; font-size: 0.8rem;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(173, 20, 87, 0.1);
        }
    </style>
</head>
<body>

    <div class="sparkles" id="sparkles"></div>

    <div class="content">
        <div class="header-title" id="title">Our Story</div>
        <div class="divider" id="divider"></div>

        <div class="story-box">
            <p class="type-text" id="typingTarget"></p>
        </div>

        <div class="gallery-container">
            <div class="img-box" id="img1"><img src="gambar1.png"></div>
            <div class="img-box" id="img2"><img src="gambar2.png"></div>
            <div class="img-box" id="img3"><img src="gambar3.png"></div>
            <div class="img-box" id="img4"><img src="gambar4.png"></div>
            <div class="img-box" id="img5"><img src="gambar5.png"></div>
            <div class="img-box" id="img6"><img src="gambar6.png"></div>
        </div>
    </div>

    <div class="btn-container" id="btnNext">
        <button class="nav-btn" onclick="next()">KIRIM DOA ✨</button>
    </div>

    <script>
        gsap.registerPlugin(TextPlugin);

        // Efek Sparkle
        for(let i=0; i<20; i++){
            let s = document.createElement('span');
            s.style.left = Math.random()*100+'%';
            s.style.animationDelay = Math.random()*5+'s';
            document.getElementById('sparkles').appendChild(s);
        }

        const story = [
            { text: "Semua berawal dari pertemuan tak terduga...", img: "#img1", rot: -5 },
            { text: "Tawa dan cerita mulai mewarnai hari-hari kita.", img: "#img2", rot: 4 },
            { text: "Banyak doa yang diam-diam kita langitkan bersama.", img: "#img3", rot: -3 },
            { text: "Hingga akhirnya, kita yakin untuk saling menetap.", img: "#img4", rot: 6 },
            { text: "Kini, kita siap melangkah ke gerbang yang baru.", img: "#img5", rot: -4 },
            { text: "Mari menua bersama dalam cinta yang diridhai-Nya.", img: "#img6", rot: 2 }
        ];

        const tl = gsap.timeline();

        // Start
        tl.to("#title", { opacity: 1, y: -10, duration: 1.5 })
          .to("#divider", { opacity: 1, width: 120, duration: 1 }, "-=0.5");

        // Loop Cerita + Foto 1 per 1
        story.forEach((item, index) => {
            // 1. Teks Ngetik Muncul
            tl.to("#typingTarget", {
                duration: item.text.length * 0.06,
                text: item.text,
                ease: "none"
            })
            // 2. Foto Muncul (Fade In + Scale Up)
            .to(item.img, { 
                opacity: 1, 
                scale: 1.1, 
                rotation: item.rot,
                duration: 1.2, 
                ease: "back.out(1.7)" 
            }, "-=0.5")
            // 3. Jeda untuk baca & liat foto
            .to({}, { duration: 2.5 })
            // 4. Sembunyikan untuk baris berikutnya (kecuali foto terakhir tetap ada)
            if (index < story.length - 1) {
                tl.to("#typingTarget", { opacity: 0, duration: 0.5 })
                  .to(item.img, { opacity: 0, scale: 0.8, duration: 0.8 }, "-=0.3")
                  .set("#typingTarget", { text: "", opacity: 1 });
            }
        });

        // Tombol Akhir
        tl.to("#btnNext", { opacity: 1, y: -10, duration: 1 });

        function next() { window.location.href = "wish.html"; }
    </script>
</body>
</html>

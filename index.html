<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background: radial-gradient(circle, #fce4ec, #f8bbd0);
    font-family:'Montserrat',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* FRAME */
.frame{
    width:min(90vw,360px);
    aspect-ratio:9/16;
    border-radius:35px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.25);
    border:1px solid rgba(212,175,55,0.5);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    opacity:0;
    transform:scale(0.9);
}

/* TEXT */
.title{
    font-size:0.7rem;
    letter-spacing:3px;
    color:#8b5e83;
    font-weight:600;
}

.couple{
    font-family:'Great Vibes',cursive;
    font-size:3.2rem;
    color:#8b5e83;
    margin:20px 0;
}

.guest{
    font-family:'Great Vibes',cursive;
    font-size:2rem;
    color:#d4af37;
}

/* BUTTON */
.btn{
    margin-top:25px;
    padding:12px 35px;
    border:none;
    border-radius:50px;
    background:#8b5e83;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    background:#a6759c;
}

/* PETAL */
.petal{
    position:fixed;
    top:-50px;
    font-size:1.2rem;
    opacity:0.7;
}

/* FADE TRANSITION */
.fade-out{
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="frame" id="frame">
    <p class="title">THE WEDDING OF</p>
    <h1 class="couple">Samira & Murad</h1>

    <p style="font-size:0.8rem;color:#8b5e83;">Kepada Yth:</p>
    <h2 class="guest" id="nama">Tamu Undangan</h2>

    <button class="btn" onclick="openInvite()">BUKA UNDANGAN</button>
</div>

<div class="fade-out" id="fade"></div>

<script>
// ambil nama tamu
const params = new URLSearchParams(window.location.search);
const nama = params.get('to');
if(nama){
    document.getElementById('nama').innerText = decodeURIComponent(nama);
}

// animasi masuk
gsap.to("#frame",{opacity:1,scale:1,duration:1.5,ease:"power3.out"});

// petals halus
for(let i=0;i<20;i++){
    let p=document.createElement("div");
    p.className="petal";
    p.innerHTML="🌸";
    p.style.left=Math.random()*100+"vw";
    document.body.appendChild(p);

    gsap.to(p,{
        y:"110vh",
        x:"+="+(Math.random()*80-40),
        duration:8+Math.random()*4,
        repeat:-1,
        ease:"none",
        delay:Math.random()*5
    });
}

// buka undangan (cinematic)
function openInvite(){
    gsap.to("#frame",{scale:0.9,opacity:0,duration:1,ease:"power2.inOut"});
    gsap.to("#fade",{opacity:1,duration:1.2,delay:0.5});

    setTimeout(()=>{
        window.location.href="profil.html";
    },1700);
}
</script>

</body>
</html>

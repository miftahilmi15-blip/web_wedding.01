<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Invitation - Devkia & Miftah</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #fce4ec; 
            background-image: radial-gradient(circle at center, #fff 0%, #f8bbd0 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .page-section { 
            position: absolute; 
            inset: 0; 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 20; 
            opacity: 0;
        }
        .page-section.active { display: flex; opacity: 1; }

        .main-wrapper { 
            position: relative; 
            width: 90%; 
            max-width: 340px; 
            height: 550px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .frame-container { 
            width: 100%; 
            height: 100%; 
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(25px); 
            border-radius: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 40px 25px; 
            box-shadow: 0 30px 60px rgba(139, 94, 131, 0.15); 
            text-align: center;
        }

        .header-text { letter-spacing: 5px; font-size: 0.75rem; color: #ad1457; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
        .couple-name { font-family: 'Great Vibes', cursive; color: #ad1457; font-size: 3.2rem; line-height: 1.1; margin-bottom: 20px; }
        .guest-name { font-family: 'Great Vibes', cursive; color: #ad1457; font-size: 2.6rem; margin: 15px 0; }

        .btn-buka { 
            padding: 15px 40px; 
            background: linear-gradient(45deg, #ec407a, #ad1457); 
            color: white; 
            border: none; 
            border-radius: 50px; 
            font-weight: 700; 
            cursor: pointer; 
            box-shadow: 0 10px 25px rgba(236, 64, 122, 0.4); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 0.8rem; 
        }
        
        .falling-flowers-container { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
        .flower { position: absolute; top: -10%; color: rgba(236, 64, 122, 0.4); font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="falling-flowers-container" id="flowers-bg"></div>

    <section id="opener-section" class="page-section active">
        <div class="main-wrapper" id="opener-wrapper">
            <div class="frame-container">
                <p class="header-text">The Wedding Of</p>
                <h1 class="couple-name">Devkia<br>&<br>Miftah</h1>
                <p>Kepada Yth:</p>
                <h2 class="guest-name" id="nama-tamu">Tamu Undangan</h2>
                <button class="btn-buka" onclick="goToProfil()">Buka Undangan</button>
            </div>
        </div>
    </section>

    <section id="profil-section" class="page-section">
        <div class="main-wrapper">
            <div class="frame-container">
                <h2 class="header-text" style="margin-bottom:20px;">Profil Mempelai</h2>
                <h1 class="couple-name">Devkia & Miftah</h1>
                <p style="color:#6d4c67;">Kami mengundang Anda untuk merayakan hari bahagia kami.</p>
                </div>
        </div>
    </section>

    <script>
        // Tangkap nama dari URL
        const params = new URLSearchParams(window.location.search);
        const nama = params.get('to');
        if (nama) document.getElementById('nama-tamu').innerText = decodeURIComponent(nama);

        // Animasi Bunga
        function createFlowers() {
            const container = document.getElementById('flowers-bg');
            const flowerEmojis = ['🌸', '🌺', '🌹'];
            for (let i = 0; i < 20; i++) {
                const f = document.createElement('div');
                f.className = 'flower';
                f.innerText = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
                f.style.left = Math.random() * 100 + 'vw';
                gsap.to(f, { y: '110vh', rotation: 720, duration: Math.random() * 5 + 5, repeat: -1, delay: Math.random() * 5 });
                container.appendChild(f);
            }
        }

        // Navigasi Pindah Halaman
        function goToProfil() {
            const tl = gsap.timeline();
            tl.to("#opener-section", { opacity: 0, scale: 0.9, duration: 0.5, onComplete: () => {
                document.getElementById('opener-section').classList.remove('active');
                document.getElementById('profil-section').classList.add('active');
            }})
            .to("#profil-section", { opacity: 1, duration: 0.8 });
        }

        window.onload = createFlowers;
    </script>
</body>
</html>

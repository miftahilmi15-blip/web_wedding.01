<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Luxury Wedding - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body { 
            background: #fce4ec; 
            /* Background dasar dengan gradasi radial lebih dalam */
            background-image: radial-gradient(circle at center, #ffffff 0%, #f8bbd0 50%, #f48fb1 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden;
            height: 100vh;
            perspective: 1500px;
            touch-action: none;
        }

        /* Ornamen Background biar Gak Polos */
        .bg-ornament {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: moveOrnament 15s infinite alternate ease-in-out;
        }
        .ornament-1 { width: 300px; height: 300px; background: #f06292; top: -50px; left: -50px; }
        .ornament-2 { width: 400px; height: 400px; background: #fce4ec; bottom: -100px; right: -50px; animation-delay: -5s; }

        @keyframes moveOrnament {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 100px) scale(1.2); }
        }

        .particle {
            position: fixed; background: rgba(236, 64, 122, 0.2);
            border-radius: 50%; pointer-events: none; z-index: 0;
            will-change: transform;
            animation: floatParticle 10s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -50px); }
            66% { transform: translate(-20px, 20px); }
        }

        .scene {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transform-style: preserve-3d;
            will-change: transform;
            /* Tambah padding agar konten naik dan tombol aman */
            padding-bottom: 120px; 
        }

        .profile-card { 
            margin: 8px auto; 
            opacity: 0; 
            position: relative;
            transform-style: preserve-3d;
            width: 85%; max-width: 300px;
            background: rgba(255, 255, 255, 0.3); 
            padding: 20px; border-radius: 35px;
            backdrop-filter: blur(12px); /* Blur lebih kuat biar mewah */
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 50px rgba(139, 94, 131, 0.15);
        }

        .photo-wrapper {
            position: relative;
            width: 110px; height: 110px; margin: 0 auto 12px auto;
            transform-style: preserve-3d;
        }
        
        .photo-frame {
            position: absolute; top: -6px; left: -6px;
            width: 122px; height: 122px;
            border: 2px solid #ec407a; border-radius: 50%;
            border-style: double; opacity: 0.4;
            animation: rotateFrame 20s linear infinite;
            transform: translateZ(-20px);
        }

        @keyframes rotateFrame { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .photo { 
            width: 100%; height: 100%; 
            border-radius: 50%; object-fit: cover; 
            border: 4px solid #fff;
            transform: translateZ(70px); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 { 
            font-family: 'Great Vibes', cursive; 
            font-size: 2.2rem; margin: 5px 0; 
            color: #ad1457;
            transform: translateZ(90px);
        }

        .parent-info { 
            font-size: 0.7rem; font-weight: 400; color: #6d4c67; 
            line-height: 1.4; transform: translateZ(40px);
        }

        .ampersand { 
            font-family: 'Great Vibes', cursive; 
            font-size: 2.8rem; color: #ec407a; 
            margin: 0;
            transform: translateZ(120px);
        }

        /* Container Navigasi Dibuat Lebih Tinggi */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 50px 0; /* Padding ditambah agar tombol naik */
            background: linear-gradient(to top, rgba(252, 228, 236, 1) 50%, transparent);
            z-index: 1000;
            display: flex; justify-content: center;
            pointer-events: none; /* Biar gak ganggu touch di area kosong */
        }

        .btn-event {
            pointer-events: auto; /* Aktifkan klik hanya pada tombol */
            padding: 16px 45px; background: #ec407a; color: white;
            border-radius: 50px; border: none; font-weight: 700;
            box-shadow: 0 15px 30px rgba(236, 64, 122, 0.4); 
            cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; font-size: 0.75rem;
            transition: 0.3s;
            margin-bottom: 20px; /* Jarak ekstra dari bawah layar */
        }
        .btn-event:hover { background: #d81b60; transform: translateY(-3px); }
        .btn-event:active { transform: scale(0.9); }

        @media (max-height: 700px) {
            .profile-card { padding: 15px; max-width: 250px; }
            .photo-wrapper { width: 90px; height: 90px; }
            .photo-frame { width: 102px; height: 102px; }
            h2 { font-size: 1.8rem; }
            .scene { padding-bottom: 100px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Background Ornaments -->
    <div class="bg-ornament ornament-1"></div>
    <div class="bg-ornament ornament-2"></div>

    <script>
        // Zoom Blocker
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        document.addEventListener('gesturestart', (e) => e.preventDefault());

        // Dynamic Particles
        for (let i = 0; i < 15; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            let size = Math.random() * 5 + 2;
            p.style.width = size + 'px'; p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            p.style.animationDelay = (Math.random() * 5) + 's';
            document.body.appendChild(p);
        }
    </script>

    <div class="scene" id="mainScene">
        <div class="profile-card" id="p1">
            <div class="photo-wrapper">
                <div class="photo-frame"></div>
                <img src="samira.png" class="photo" alt="Samira">
            </div>
            <h2>Samira Putri</h2>
            <p class="parent-info">Putri tercinta dari<br><b>Bpk. Fulan</b> & <b>Ibu Fulanah</b></p>
        </div>

        <div class="ampersand">&</div>

        <div class="profile-card" id="p2">
            <div class="photo-wrapper">
                <div class="photo-frame"></div>
                <img src="murad.png" class="photo" alt="Murad">
            </div>
            <h2>Murad Al-Fatih</h2>
            <p class="parent-info">Putra tercinta dari<br><b>Bpk. John</b> & <b>Ibu Doe</b></p>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="btn-event" onclick="next()">LIHAT JADWAL ACARA</button>
    </div>

    <script>
        window.onload = () => {
            const tl = gsap.timeline();
            tl.to(".profile-card", { opacity: 1, duration: 1.2, stagger: 0.3, ease: "power3.out" })
              .from(".photo", { z: 300, opacity: 0, duration: 1, stagger: 0.3, ease: "back.out(1.5)" }, "-=0.8");

            const scene = document.getElementById('mainScene');
            let ticking = false;

            const handleMove = (e) => {
                if (!ticking) {
                    window.requestAnimationFrame(() => {
                        const xVal = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                        const yVal = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                        
                        const rotateY = (window.innerWidth / 2 - xVal) / 18; 
                        const rotateX = (yVal - window.innerHeight / 2) / 18;

                        gsap.to(scene, {
                            rotationY: rotateY, rotationX: rotateX,
                            duration: 0.8, ease: "power2.out"
                        });
                        ticking = false;
                    });
                    ticking = true;
                }
            };

            window.addEventListener('mousemove', handleMove);
            window.addEventListener('touchmove', handleMove, { passive: false });
        };

        function next() {
            gsap.to("body", { opacity: 0, duration: 0.6, onComplete: () => {
                window.location.href = "acara.html";
            }});
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papan Ucapan Ribuan Doa</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #fce4ec; 
            font-family: 'Montserrat', sans-serif; 
            color: #8b5e83; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        header { 
            padding: 25px 20px; 
            text-align: center; 
            background: rgba(255,255,255,0.7); 
            backdrop-filter: blur(10px); 
            z-index: 100; 
            border-bottom: 1px solid rgba(255,255,255,0.5); 
            box-shadow: 0 4px 15px rgba(173, 20, 87, 0.05);
        }
        h1 { font-family: 'Great Vibes', cursive; font-size: 2.8rem; color: #ad1457; margin-bottom: 5px; }
        
        .marquee-container { 
            flex: 1; 
            position: relative; 
            overflow: hidden; 
            width: 100%; 
            /* Efek fade atas bawah supaya smooth */
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }
        
        .scroll-content { 
            position: absolute; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 100px 0; /* Jeda awal agar tidak langsung nempel atas */
        }
        
        .wish-card { 
            width: 90%; 
            max-width: 450px; 
            background: rgba(255, 255, 255, 0.8); 
            padding: 25px; 
            margin-bottom: 25px; 
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(139, 94, 131, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.9);
            transition: transform 0.3s ease;
        }
        
        .guest-name { font-weight: 700; color: #ad1457; font-size: 1rem; display: block; margin-bottom: 8px; }
        .message { font-size: 0.9rem; line-height: 1.6; font-style: italic; color: #6d4c67; }
        
        .footer-nav { 
            padding: 20px; 
            text-align: center; 
            background: white; 
            z-index: 100; 
            border-top: 1px solid #fce4ec;
        }
        
        .btn-back { 
            display: inline-block;
            padding: 12px 35px; 
            background: #ad1457; 
            color: white; 
            border-radius: 50px; 
            text-decoration: none; 
            font-size: 0.85rem; 
            font-weight: 600; 
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(173, 20, 87, 0.2);
        }
    </style>
</head>
<body>

    <header>
        <h1>Ribuan Doa Restu</h1>
        <p style="font-size: 0.7rem; letter-spacing: 2px; color: #ad1457; font-weight: 600;">TERIMA KASIH ATAS DOA ANDA</p>
    </header>

    <div class="marquee-container" id="marquee">
        <div class="scroll-content" id="content">
            </div>
    </div>

    <div class="footer-nav">
        <a href="index.html" class="btn-back">KEMBALI KE DEPAN</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://wedding-4646f-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const content = document.getElementById('content');
        const marquee = document.getElementById('marquee');
        const wishesRef = ref(db, 'ucapan');

        let currentPos = 0;
        let isMoving = true;

        // Fungsi Ambil Data
        onValue(wishesRef, (snapshot) => {
            const data = snapshot.val();
            content.innerHTML = ""; 

            if (data) {
                // Balik urutan supaya yang terbaru bisa diatur (opsional)
                const list = Object.values(data);
                
                list.forEach(item => {
                    content.innerHTML += `
                        <div class="wish-card">
                            <span class="guest-name">♥ ${item.nama}</span>
                            <p class="message">"${item.pesan}"</p>
                        </div>
                    `;
                });
            } else {
                content.innerHTML = "<p style='text-align:center; margin-top: 50px;'>Menunggu kiriman doa...</p>";
            }
        });

        // --- ANIMASI SCROLL OTOMATIS ---
        function animateScroll() {
            if (isMoving) {
                currentPos -= 0.6; // Kecepatan pelan & elegan
                
                // Jika sudah mentok ke atas, balikkan ke bawah marquee (posisi container)
                if (Math.abs(currentPos) >= content.offsetHeight) {
                    currentPos = marquee.offsetHeight; 
                }
                
                content.style.transform = `translateY(${currentPos}px)`;
            }
            requestAnimationFrame(animateScroll);
        }

        // Jalankan animasi
        animateScroll();

        // Fitur: Berhenti saat disentuh (supaya tamu bisa baca tenang)
        marquee.addEventListener('touchstart', () => { isMoving = false; });
        marquee.addEventListener('touchend', () => { isMoving = true; });
        marquee.addEventListener('mouseenter', () => { isMoving = false; });
        marquee.addEventListener('mouseleave', () => { isMoving = true; });

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Message - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Amiri&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .container {
            width: 85vw; max-width: 400px; text-align: center;
            padding: 20px; z-index: 10;
        }

        .arabic {
            font-family: 'Amiri', serif;
            font-size: 1.5rem; color: #8b5e83; line-height: 2.3;
            margin-bottom: 20px; opacity: 0;
        }

        .artinya {
            font-size: 0.85rem; font-style: italic; color: #555;
            line-height: 1.7; margin-bottom: 30px; opacity: 0;
        }

        /* --- GAMBAR TANPA BINGKAI (CLEAN) --- */
        .gate-container {
            position: relative; margin: 20px auto;
            width: 160px; height: 160px; opacity: 0; scale: 0.8;
        }
        .gate-img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover;
            /* Efek bayangan halus saja, tanpa garis border emas */
            filter: drop-shadow(0 10px 15px rgba(139, 94, 131, 0.2));
        }

        .text-kepo {
            margin-top: 20px; font-size: 0.8rem; color: #8b5e83;
            font-weight: 600; opacity: 0;
        }

        /* --- TOMBOL WARNA DEEP ROSE (ANTI-EMAS) --- */
        .btn-kepo {
            margin-top: 15px; padding: 12px 40px;
            background: #8b5e83; /* Warna senada nama mempelai */
            color: white; border: none;
            border-radius: 50px; font-weight: 600; cursor: pointer;
            box-shadow: 0 5px 15px rgba(139, 94, 131, 0.3);
            opacity: 0; transition: 0.3s;
        }
        
        .btn-kepo:hover { background: #a6759c; transform: scale(1.05); }

        .deco { position: fixed; font-size: 2rem; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="deco" style="top:20px; left:20px;">🌸</div>
    <div class="deco" style="bottom:20px; right:20px;">🌺</div>

    <div class="container">
        <div class="arabic" id="txt1">
            وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا لِّتَسْكُنُوا إِلَيْهَا وَجَعَلَ بَيْنَكُم مَّوَدَّةً وَرَحْمَةً
        </div>
        
        <div class="artinya" id="txt2">
            “Dan di antara tanda-tanda (kebesaran)-Nya ialah Dia menciptakan pasangan-pasangan untukmu dari jenismu sendiri...”
        </div>

        <div class="gate-container" id="gate">
            <img src="https://images.unsplash.com/photo-1523438885200-e635ba2c371e?q=80&w=500" class="gate-img" alt="Clean Gate">
        </div>

        <p class="text-kepo" id="txt3">Jangan bengong, langsung pencet next!</p>
        
        <button class="btn-kepo" id="btn" onclick="pindahHalaman()">Next Chapter 🩷</button>
    </div>

    <script>
        window.onload = () => {
            const tl = gsap.timeline();

            tl.to("#txt1", { opacity: 1, duration: 1.2 })
              .to("#txt2", { opacity: 1, duration: 1 }, "-=0.5")
              .to("#gate", { opacity: 1, scale: 1, duration: 1, ease: "power2.out" })
              .to("#txt3", { opacity: 1, duration: 0.8 })
              .to("#btn", { 
                  opacity: 1, 
                  y: -5, 
                  repeat: -1, 
                  yoyo: true, 
                  duration: 0.8, 
                  ease: "sine.inOut" 
              });
        };

        function pindahHalaman() {
            gsap.to(".container", { opacity: 0, scale: 0.9, duration: 0.5 });
            setTimeout(() => {
                window.location.href = "mempelai.html";
            }, 500);
        }
    </script>
</body>
</html>

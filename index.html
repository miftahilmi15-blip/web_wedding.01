<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: radial-gradient(circle, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- 1. BUNGA MUTER POJOK (PENGGANTI PIRINGAN) --- */
        .flower-vinyl {
            position: fixed; bottom: 20px; right: 20px;
            width: 75px; height: 75px; z-index: 50;
            filter: drop-shadow(0 4px 10px rgba(212,175,55,0.3));
        }

        /* --- 2. FRAME PRESISI --- */
        .frame-wrapper {
            position: relative; 
            z-index: 10; /* Di belakang bunga berjatuhan */
            opacity: 0; scale: 0.9;
        }
        .frame-container {
            width: 320px; height: 550px; /* Ukuran presisi HP */
            border: 2px solid #d4af37; 
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px); border-radius: 40px;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        /* --- 3. BUNGA BERGUGURAN (Z-INDEX 100 - DI DEPAN FRAME) --- */
        #petal-container {
            position: fixed; inset: 0; z-index: 100;
            pointer-events: none;
        }
        .petal {
            position: absolute; color: #fff; font-size: 1.5rem;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.3));
        }

        .couple-name {
            font-family: 'Great Vibes', cursive; color: #8b5e83;
            font-size: 3.5rem; text-align: center; margin: 20px 0;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .guest-name {
            font-family: 'Great Vibes', cursive; color: #d4af37;
            font-size: 2.2rem; margin: 10px 0;
        }

        .btn-buka {
            margin-top: 30px; padding: 12px 40px; background: #8b5e83;
            color: white; border: none; border-radius: 50px; font-weight: 600;
            cursor: pointer; transition: 0.4s; box-shadow: 0 5px 15px rgba(139,94,131,0.3);
        }
        .btn-buka:hover { scale: 1.1; background: #a6759c; }

        /* --- TRANSISI BADAI BUNGA --- */
        #storm-layer {
            position: fixed; inset: 0; z-index: 9999; 
            pointer-events: none; display: none;
        }
    </style>
</head>
<body>

    <div id="petal-container"></div>
    <div id="storm-layer"></div>

    <div class="flower-vinyl" id="vinyl">
        <svg viewBox="0 0 100 100" fill="#d4af37">
            <path d="M50 50 L50 10 A15 15 0 0 1 65 25 L50 50 Z M50 50 L90 50 A15 15 0 0 1 75 65 L50 50 Z M50 50 L50 90 A15 15 0 0 1 35 75 L50 50 Z M50 50 L10 50 A15 15 0 0 1 25 35 L50 50 Z M50 50 L78 22 A15 15 0 0 1 93 37 L50 50 Z M50 50 L78 78 A15 15 0 0 1 63 93 L50 50 Z M50 50 L22 78 A15 15 0 0 1 7 63 L50 50 Z M50 50 L22 22 A15 15 0 0 1 37 7 L50 50 Z"/>
            <circle cx="50" cy="50" r="8" fill="#fff"/>
        </svg>
    </div>

    <div class="frame-wrapper" id="main-frame">
        <div class="frame-container">
            <p style="letter-spacing: 4px; font-size: 0.7rem; color: #8b5e83; font-weight: 600;">THE WEDDING OF</p>
            <h1 class="couple-name" id="shimmer-text">Samira & Murad</h1>

            <div style="text-align: center; margin-top: 20px;">
                <p style="font-size: 0.8rem; color: #8b5e83;">Kepada Yth:</p>
                <h2 class="guest-name" id="nama-tamu">Tamu Undangan</h2>
                <button class="btn-buka" onclick="startStorm()">BUKA UNDANGAN</button>
            </div>
        </div>
    </div>

    <script>
        // 1. DUKUN TRACKER
        const params = new URLSearchParams(window.location.search);
        const nama = params.get('to');
        if (nama) {
            document.getElementById('nama-tamu').innerText = decodeURIComponent(nama);
            localStorage.setItem('namaTamu', decodeURIComponent(nama));
        }

        // 2. GENERATE FLOATING PETALS (DI DEPAN FRAME)
        const petalContainer = document.getElementById('petal-container');
        const petals = ['🌸', '💮', '✨', '🤍'];
        for (let i = 0; i < 35; i++) {
            const p = document.createElement('div');
            p.className = 'petal';
            p.innerHTML = petals[Math.floor(Math.random() * petals.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = -50 + 'px';
            p.style.opacity = Math.random() * 0.7 + 0.3;
            petalContainer.appendChild(p);

            gsap.to(p, {
                y: window.innerHeight + 100,
                x: "+=" + (Math.random() * 100 - 50),
                rotation: Math.random() * 720,
                duration: Math.random() * 8 + 4,
                repeat: -1,
                delay: Math.random() * 5,
                ease: "none"
            });
        }

        // 3. ANIMASI MASUK & BUNGA MUTER
        window.onload = () => {
            gsap.to("#main-frame", { opacity: 1, scale: 1, duration: 1.5, ease: "power3.out" });
            gsap.to("#vinyl", { rotate: 360, duration: 8, repeat: -1, ease: "linear" });
            
            // Shimmer pelan pada nama
            gsap.to("#shimmer-text", { opacity: 0.8, duration: 2, repeat: -1, yoyo: true });
        };

        // 4. TRANSISI BADAI BUNGA
        function startStorm() {
            const storm = document.getElementById('storm-layer');
            storm.style.display = 'block';
            
            for(let i=0; i<60; i++) {
                let div = document.createElement('div');
                div.innerHTML = (i % 2 === 0) ? '🌸' : '🤍';
                div.style.position = 'fixed';
                div.style.left = Math.random() * 100 + 'vw';
                div.style.top = '120vh';
                div.style.fontSize = (Math.random() * 2 + 1) + 'rem';
                storm.appendChild(div);

                gsap.to(div, {
                    y: '-130vh', x: "+=" + (Math.random() * 300 - 150),
                    rotation: 1080, duration: 2, ease: "power2.inOut",
                    delay: Math.random() * 0.5
                });
            }

            gsap.to("#main-frame", { opacity: 0, scale: 0.8, duration: 1 });
            gsap.to("#vinyl", { opacity: 0, duration: 1 });
            
            setTimeout(() => {
                window.location.href = "profil.html";
            }, 1800);
        }
    </script>
</body>
</html>

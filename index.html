<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; /* Anti-scroll di halaman 1 */
            height: 100vh;
        }

        #opening-scene {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
        }

        /* Kontainer Gambar Puzzle (350px x 600px - Ukuran HP Standar) */
        .puzzle-box {
            position: relative;
            width: 350px; height: 600px;
            display: flex; flex-wrap: wrap;
            box-shadow: 0 0 50px rgba(184, 146, 106, 0.2);
        }

        /* Kepingan Gambar (Pecahan 5x5 = 25 keping) */
        .fragment {
            width: 20%; height: 20%;
            background-image: url('opening-full.png'); /* PASTIKAN NAMA FILE SAMA BOS */
            background-size: 500% 500%;
            background-repeat: no-repeat;
            position: absolute;
            opacity: 0;
        }

        /* Overlay Teks & Tombol */
        .overlay-content {
            position: absolute; z-index: 100;
            text-align: center; width: 100%;
            bottom: 60px; opacity: 0; transform: translateY(30px);
        }

        .guest-name {
            font-family: 'Great Vibes', cursive;
            color: #b8926a; font-size: 2.5rem; margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .btn-buka {
            padding: 12px 30px; background: #b8926a; color: #fff;
            border: none; border-radius: 50px; cursor: pointer;
            font-weight: 600; letter-spacing: 2px; transition: 0.3s;
        }
        .btn-buka:hover { background: #d4af37; scale: 1.1; }

        /* Efek Kilau pada Gambar (Opsional) */
        .puzzle-box::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.1) 45%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.1) 55%, transparent 70%);
            background-size: 200% 200%; animation: shine 4s infinite; pointer-events: none;
        }
        @keyframes shine { 0% { background-position: -200% -200%; } 100% { background-position: 200% 200%; } }
    </style>
</head>
<body>

    <div id="opening-scene">
        <div class="puzzle-box" id="puzzle-box">
            </div>

        <div class="overlay-content" id="ui-content">
            <p style="color: #eee; font-size: 0.7rem; letter-spacing: 3px;">KEPADA YTH:</p>
            <h2 class="guest-name" id="nama-tamu">Tamu Undangan</h2>
            <button class="btn-buka" onclick="nextPage()">BUKA UNDANGAN</button>
        </div>
    </div>

    <script>
        // 1. DUKUN TRACKER: Ambil nama dari URL
        const params = new URLSearchParams(window.location.search);
        const nama = params.get('to');
        if (nama) {
            const decodedNama = decodeURIComponent(nama);
            document.getElementById('nama-tamu').innerText = decodedNama;
            // "Iket" nama buat halaman profil.html besok
            localStorage.setItem('namaTamu', decodedNama);
        }

        // 2. GENERATE PUZZLE FRAGMENTS (5x5)
        const box = document.getElementById('puzzle-box');
        const rows = 5; const cols = 5;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const frag = document.createElement('div');
                frag.className = 'fragment';
                frag.style.width = '20%'; frag.style.height = '20%';
                frag.style.left = (c * 20) + '%';
                frag.style.top = (r * 20) + '%';
                frag.style.backgroundPosition = (c * 25) + '% ' + (r * 25) + '%';
                box.appendChild(frag);
            }
        }

        // 3. ANIMASI LIAR GSAP: Kepingan terbang masuk
        window.onload = () => {
            const frags = document.querySelectorAll('.fragment');
            const tl = gsap.timeline();

            frags.forEach((f, i) => {
                // Posisi acak dari luar layar
                gsap.set(f, { 
                    x: (Math.random() - 0.5) * 1500, 
                    y: (Math.random() - 0.5) * 1500, 
                    rotation: (Math.random() - 0.5) * 1000,
                    scale: 0, opacity: 0 
                });
            });

            // Terbang menyatu
            tl.to(".fragment", {
                x: 0, y: 0, rotation: 0, scale: 1, opacity: 1,
                duration: 2.5, stagger: 0.05, ease: "expo.out"
            })
            // Munculin Teks & Tombol
            .to("#ui-content", { opacity: 1, y: 0, duration: 1 }, "-=1");
        };

        // 4. PINDAH HALAMAN (Anti-Scroll)
        function nextPage() {
            gsap.to("#opening-scene", { 
                y: -1000, opacity: 0, duration: 1.2, ease: "power4.inOut",
                onComplete: () => {
                    window.location.href = "profil.html"; // Pindah ke halaman 2
                }
            });
        }
    </script>
</body>
</html>

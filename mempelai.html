<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Couple - Samira & Murad</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background: #fce4ec; font-family: 'Montserrat', sans-serif; text-align: center; color: #8b5e83; margin: 0; padding-bottom: 120px; }
        .profile-card { margin: 40px auto; opacity: 0; transform: translateY(30px); }
        .photo-wrapper {
            width: 160px; height: 160px; margin: 0 auto 15px auto;
            border-radius: 50%; background: #fff; padding: 5px;
            box-shadow: 0 10px 25px rgba(139, 94, 131, 0.15);
            overflow: hidden; opacity: 0; scale: 0.5;
        }
        .photo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        h2 { font-family: 'Great Vibes', cursive; font-size: 2.6rem; margin: 10px 0 5px 0; color: #8b5e83; }
        .parent-info { font-size: 0.8rem; font-weight: 300; color: #a6759c; line-height: 1.5; }
        .ampersand { font-family: 'Great Vibes', cursive; font-size: 2.5rem; margin: 15px 0; color: #f06292; opacity: 0; }
        
        .btn-event-wrapper {
            position: fixed; bottom: 0; left: 0; width: 100%; padding: 25px 0;
            background: linear-gradient(to top, #fce4ec 70%, rgba(252, 228, 236, 0)); z-index: 100;
        }
        .btn-event {
            padding: 15px 40px; background: #ec407a; color: white;
            border-radius: 50px; border: none; font-weight: bold;
            box-shadow: 0 5px 15px rgba(236, 64, 122, 0.3); cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="profile-card" id="p1">
        <div class="photo-wrapper" id="pw1">
            <img src="samira.png" class="photo" alt="Samira">
        </div>
        <h2>Samira Putri</h2>
        <p class="parent-info">Putri tercinta dari<br>Bpk. Fulan & Ibu Fulanah</p>
    </div>

    <div class="ampersand" id="amp">&</div>

    <div class="profile-card" id="p2">
        <div class="photo-wrapper" id="pw2">
            <img src="murad.png" class="photo" alt="Murad">
        </div>
        <h2>Murad Al-Fatih</h2>
        <p class="parent-info">Putra tercinta dari<br>Bpk. John & Ibu Doe</p>
    </div>

    <div class="btn-event-wrapper">
        <button class="btn-event" onclick="next()">LIHAT JADWAL ACARA</button>
    </div>

    <script>
        const tl = gsap.timeline();
        tl.to("#p1", { opacity: 1, y: 0, duration: 1 })
          .to("#pw1", { opacity: 1, scale: 1, duration: 0.8, ease: "back.out" }, "-=0.5")
          .to("#amp", { opacity: 1, duration: 0.5 }, "-=0.2")
          .to("#p2", { opacity: 1, y: 0, duration: 1 }, "-=0.3")
          .to("#pw2", { opacity: 1, scale: 1, duration: 0.8, ease: "back.out" }, "-=0.5");

        function next() {
            gsap.to("body", { opacity: 0, duration: 0.5 });
            setTimeout(() => { window.location.href = "acara.html"; }, 500);
        }
    </script>
</body>
</html>

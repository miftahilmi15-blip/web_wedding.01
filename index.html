<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#0f0f0f;
    font-family:'Montserrat',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:#fff;
}

/* GLOW HALUS */
.glow{
    position:fixed;
    width:400px;
    height:400px;
    background:radial-gradient(circle, rgba(212,175,55,0.2), transparent);
    border-radius:50%;
    filter:blur(100px);
    top:30%;
    left:50%;
    transform:translateX(-50%);
}

/* FRAME */
.frame{
    width:min(90vw,380px);
    padding:45px 25px;
    border:1px solid rgba(212,175,55,0.3);
    text-align:center;
    position:relative;
    opacity:0;
}

/* BORDER DALAM */
.frame::before{
    content:'';
    position:absolute;
    inset:10px;
    border:1px solid rgba(212,175,55,0.2);
}

/* TEXT */
.title{
    font-size:0.7rem;
    letter-spacing:4px;
    color:#aaa;
}

.name{
    font-family:'Playfair Display',serif;
    font-size:2.8rem;
    margin:25px 0;
    color:#d4af37;
}

.guest{
    margin-top:15px;
    font-size:0.9rem;
    color:#bbb;
}

.guest-name{
    font-family:'Playfair Display',serif;
    font-size:1.8rem;
    margin-top:5px;
    color:#fff;
}

/* BUTTON */
.btn{
    margin-top:30px;
    padding:12px 35px;
    border:1px solid #d4af37;
    background:transparent;
    color:#d4af37;
    cursor:pointer;
    letter-spacing:2px;
    transition:0.3s;
}

.btn:hover{
    background:#d4af37;
    color:#000;
}

/* FLOATING TEXT (GANTI MANTUL) */
.float-text{
    position:fixed;
    font-family:'Playfair Display',serif;
    color:rgba(212,175,55,0.15);
    font-size:2rem;
    pointer-events:none;
}

/* FADE */
.fade{
    position:fixed;
    inset:0;
    background:#0f0f0f;
    opacity:0;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="frame" id="frame">
    <p class="title">WEDDING INVITATION</p>

    <h1 class="name">Samira & Murad</h1>

    <div class="guest">
        Kepada Yth
        <div class="guest-name" id="nama">Tamu Undangan</div>
    </div>

    <button class="btn" onclick="openInvite()">OPEN</button>
</div>

<div class="fade" id="fade"></div>

<script>
// ambil nama tamu
const params = new URLSearchParams(window.location.search);
const nama = params.get('to');
if(nama){
    document.getElementById('nama').innerText = decodeURIComponent(nama);
}

// animasi masuk
gsap.to("#frame",{opacity:1,y:-20,duration:1.5,ease:"power3.out"});

// FLOATING TEXT (HALUS, BUKAN MANTUL)
function createFloatText(text){
    let el=document.createElement("div");
    el.className="float-text";
    el.innerText=text;

    el.style.left=Math.random()*100+"vw";
    el.style.top="100vh";

    document.body.appendChild(el);

    gsap.to(el,{
        y:"-120vh",
        x:"+="+(Math.random()*100-50),
        duration:8+Math.random()*4,
        opacity:0,
        ease:"power1.out",
        onComplete:()=>el.remove()
    });
}

// spawn pelan
setInterval(()=>{
    createFloatText("Samira");
    createFloatText("Murad");
},3000);

// buka undangan
function openInvite(){
    gsap.to("#frame",{opacity:0,y:30,duration:1});
    gsap.to("#fade",{opacity:1,duration:1.2});

    setTimeout(()=>{
        window.location.href="profil.html";
    },1500);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Couple - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Amiri&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #fce4ec; 
            background-image: radial-gradient(#f8bbd0 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            font-family: 'Montserrat', sans-serif; 
            text-align: center; 
            color: #8b5e83; 
            overflow: hidden; /* Biar partikel nggak bikin scroll */
            height: 100vh;
            perspective: 1500px; /* Diperkuat perspektifnya */
        }

        .decoration {
            position: fixed; width: 150px; opacity: 0.4; z-index: -1;
            pointer-events: none;
        }
        .top-left { top: -20px; left: -20px; transform: rotate(90deg); }
        .bottom-right { bottom: 80px; right: -20px; transform: rotate(-90deg); }

        /* Partikel melayang untuk depth */
        .particle {
            position: fixed; background: rgba(236, 64, 122, 0.2);
            border-radius: 50%; pointer-events: none; z-index: 1;
        }

        .scene {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .profile-card { 
            margin: 20px auto; 
            opacity: 0; 
            position: relative;
            transform-style: preserve-3d;
            width: 90%; max-width: 320px;
            background: rgba(255, 255, 255, 0.15);
            padding: 20px; border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            /* Bayangan dinamis */
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        }

        .photo-wrapper {
            position: relative;
            width: 150px; height: 150px; margin: 0 auto 15px auto;
            opacity: 0; scale: 0.5;
            transform-style: preserve-3d;
        }
        
        .photo-frame {
            position: absolute; top: -8px; left: -8px;
            width: 166px; height: 166px;
            border: 2px solid #ec407a; border-radius: 50%;
            border-style: double; opacity: 0.4;
            animation: rotateFrame 15s linear infinite;
            transform: translateZ(-30px); /* Jauh di belakang */
        }

        @keyframes rotateFrame { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .photo { 
            width: 100%; height: 100%; 
            border-radius: 50%; object-fit: cover; 
            border: 4px solid #fff;
            transform: translateZ(60px); /* Sangat menonjol ke depan */
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        h2 { 
            font-family: 'Great Vibes', cursive; 
            font-size: 2.8rem; margin: 10px 0; 
            color: #ad1457;
            transform: translateZ(90px); /* Paling depan */
            text-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .parent-info { 
            font-size: 0.8rem; font-weight: 400; color: #6d4c67; 
            line-height: 1.5; transform: translateZ(40px);
        }

        .ampersand { 
            font-family: 'Great Vibes', cursive; 
            font-size: 3rem; margin: 10px 0; 
            color: #ec407a; opacity: 0;
            transform: translateZ(120px); /* Sangat menonjol */
        }

        .btn-event-wrapper {
            position: fixed; bottom: 0; left: 0; width: 100%; padding: 30px 0;
            background: linear-gradient(to top, #fce4ec 80%, rgba(252, 228, 236, 0)); 
            z-index: 100;
        }
        .btn-event {
            padding: 16px 45px; background: #ec407a; color: white;
            border-radius: 50px; border: none; font-weight: 700;
            box-shadow: 0 10px 25px rgba(236, 64, 122, 0.4); 
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="decoration top-left">🌸</div>
    <div class="decoration bottom-right">🌸</div>

    <div class="scene" id="mainScene">
        <div class="profile-card" id="p1">
            <div class="photo-wrapper" id="pw1">
                <div class="photo-frame"></div>
                <img src="samira.png" class="photo" alt="Samira">
            </div>
            <h2>Samira Putri</h2>
            <p class="parent-info">Putri tercinta dari<br><b>Bpk. Fulan</b> & <b>Ibu Fulanah</b></p>
        </div>

        <div class="ampersand" id="amp">&</div>

        <div class="profile-card" id="p2">
            <div class="photo-wrapper" id="pw2">
                <div class="photo-frame"></div>
                <img src="murad.png" class="photo" alt="Murad">
            </div>
            <h2>Murad Al-Fatih</h2>
            <p class="parent-info">Putra tercinta dari<br><b>Bpk. John</b> & <b>Ibu Doe</b></p>
        </div>
    </div>

    <div class="btn-event-wrapper">
        <button class="btn-event" onclick="next()">LIHAT JADWAL ACARA</button>
    </div>

    <script>
        // Buat partikel emas melayang untuk efek kedalaman
        for (let i = 0; i < 20; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            let size = Math.random() * 5 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            document.body.appendChild(p);
            
            gsap.to(p, {
                y: "random(-100, 100)",
                x: "random(-50, 50)",
                duration: "random(5, 10)",
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut"
            });
        }

        window.onload = () => {
            const tl = gsap.timeline();

            // Animasi masuk 3D
            tl.to(".profile-card", { opacity: 1, duration: 1, stagger: 0.4 })
              .to(".photo-wrapper", { opacity: 1, scale: 1, duration: 1, stagger: 0.4, ease: "back.out(2)" }, "-=1")
              .to("#amp", { opacity: 1, duration: 0.5 }, "-=0.5");

            // INTERAKSI 3D SENSITIF (Mouse & Tilt)
            const scene = document.getElementById('mainScene');
            
            const handleMove = (e) => {
                const xVal = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                const yVal = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                
                // Nilai rotasi lebih ekstrim biar "tampak" 3D
                const rotateY = (window.innerWidth / 2 - xVal) / 10; 
                const rotateX = (yVal - window.innerHeight / 2) / 15;

                gsap.to(scene, {
                    rotationY: rotateY,
                    rotationX: rotateX,
                    duration: 0.5,
                    ease: "power1.out"
                });
            };

            window.addEventListener('mousemove', handleMove);
            window.addEventListener('touchmove', (e) => {
                handleMove(e);
                e.preventDefault();
            }, { passive: false });
        };

        function next() {
            gsap.to("body", { opacity: 0, duration: 0.5 });
            setTimeout(() => { window.location.href = "acara.html"; }, 500);
        }
    </script>
</body>
</html>

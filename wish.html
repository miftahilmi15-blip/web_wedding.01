<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishes - Devkia & Miftah</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAyFx2PZ8_l3URsfHJZAzodrNgyEW4RkSg",
            authDomain: "wedding-4646f.firebaseapp.com",
            databaseURL: "https://wedding-4646f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "wedding-4646f",
            storageBucket: "wedding-4646f.appspot.com",
            messagingSenderId: "952816746342",
            appId: "1:952816746342:web:93b09218ac8f91cc5a12a7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.db = db;
        window.ref = ref;
        window.push = push;
        window.set = set;
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #fce4ec; 
            background-image: radial-gradient(circle at center, #fff 0%, #f8bbd0 100%);
            font-family: 'Montserrat', sans-serif; 
            padding: 20px; 
            color: #8b5e83; 
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }
        h2 { font-family: 'Great Vibes', cursive; font-size: 3rem; color: #ad1457; margin: 20px 0; }
        h3 { font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; margin: 30px 0 15px; color: #ad1457; font-weight: 600; }

        .form-box { 
            width: 100%; max-width: 400px;
            background: rgba(255, 255, 255, 0.5); 
            backdrop-filter: blur(15px);
            padding: 25px; 
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px rgba(173, 20, 87, 0.1);
            z-index: 10;
        }
        input, textarea { 
            width: 100%; padding: 15px; margin: 8px 0; 
            border-radius: 15px; border: 1px solid rgba(173, 20, 87, 0.1); 
            background: rgba(255, 255, 255, 0.8);
            font-family: 'Montserrat', sans-serif; outline: none; 
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: #ec407a; background: #fff; }

        /* TOMBOL UTAMA MENYALA */
        .btn-send { 
            width: 100%; padding: 16px; 
            background: linear-gradient(45deg, #ad1457, #ff4081); 
            color: white; border: none; border-radius: 50px; 
            font-weight: 700; cursor: pointer; margin-top: 10px;
            box-shadow: 0 8px 20px rgba(173, 20, 87, 0.3);
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-send:active { transform: scale(0.95); }

        .gift-card { 
            width: 100%; max-width: 350px;
            background: linear-gradient(135deg, #ad1457 0%, #6a0d33 100%);
            padding: 25px; border-radius: 20px; 
            color: white; position: relative; overflow: hidden;
            box-shadow: 0 15px 30px rgba(106, 13, 51, 0.3);
            text-align: left; margin-bottom: 20px;
            z-index: 10;
        }
        .bank-name { font-size: 0.7rem; letter-spacing: 2px; opacity: 0.8; margin-bottom: 10px; }
        .acc-number { font-size: 1.3rem; font-weight: 600; margin-bottom: 10px; letter-spacing: 2px; }
        .acc-name { font-size: 0.8rem; text-transform: uppercase; opacity: 0.9; }

        .btn-copy {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255,255,255,0.4);
            color: white; padding: 6px 15px; border-radius: 10px; font-size: 0.65rem;
            cursor: pointer; transition: 0.3s; font-weight: 600;
        }

        /* TOMBOL FINISH BERWARNA */
        .btn-finish { 
            margin: 40px 0 60px; padding: 15px 40px; 
            background: white; 
            color: #ad1457; 
            border: 2px solid #ad1457;
            border-radius: 50px; font-size: 0.85rem; font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(173, 20, 87, 0.15);
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-finish:hover {
            background: #ad1457;
            color: white;
        }

        .particle { position: fixed; pointer-events: none; z-index: 1; color: #ff4081; opacity: 0.4; }
    </style>
</head>
<body>

    <script>
        for (let i = 0; i < 20; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.innerHTML = '🌸';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            p.style.fontSize = (Math.random() * 15 + 10) + 'px';
            document.body.appendChild(p);
            gsap.to(p, {
                y: "random(-150, 150)", x: "random(-80, 80)",
                duration: "random(5, 10)", repeat: -1, yoyo: true, ease: "sine.inOut"
            });
        }
    </script>

    <h2>Doa Restu</h2>
    
    <div class="form-box">
        <input type="text" id="nama" placeholder="Nama Anda">
        <textarea id="pesan" placeholder="Tulis ucapan tulus..." rows="4"></textarea>
        <button class="btn-send" onclick="send()">KIRIM UCAPAN SEKARANG 💌</button>
    </div>

    <h3>Kado Digital 🎁</h3>
    
    <div class="gift-card">
        <button class="btn-copy" onclick="copyRek('1234567890', this)">SALIN</button>
        <p class="bank-name">BANK CENTRAL ASIA (BCA)</p>
        <p class="acc-number">1234 5678 90</p>
        <p class="acc-name">Devkia Putri</p>
    </div>

    <div class="gift-card" style="background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);">
        <button class="btn-copy" onclick="copyRek('0987654321', this)">SALIN</button>
        <p class="bank-name">BANK MANDIRI</p>
        <p class="acc-number">0987 6543 21</p>
        <p class="acc-name">Miftah Ilmi</p>
    </div>

    <button class="btn-finish" onclick="home()">Lihat Semua Ucapan ✨</button>

    <script>
        gsap.from(".form-box", { opacity: 0, y: 50, duration: 1.2, ease: "power3.out" });
        gsap.from(".gift-card", { opacity: 0, scale: 0.9, duration: 1, stagger: 0.3, delay: 0.5 });

        async function send() {
            const nama = document.getElementById('nama').value;
            const pesan = document.getElementById('pesan').value;

            if(nama === "" || pesan === "") { 
                alert("Mohon isi nama dan pesan Anda"); 
                return; 
            }

            try {
                const ucapanRef = window.ref(window.db, 'ucapan');
                const newUcapanRef = window.push(ucapanRef);
                
                await window.set(newUcapanRef, {
                    nama: nama,
                    pesan: pesan,
                    timestamp: Date.now()
                });

                alert('Terima kasih ' + nama + ' atas doa tulusnya!');
                document.getElementById('nama').value = "";
                document.getElementById('pesan').value = "";
            } catch (error) {
                console.error("Gagal: ", error);
                alert("Gagal mengirim, periksa koneksi.");
            }
        }

        function copyRek(no, btn) {
            navigator.clipboard.writeText(no);
            const originalText = btn.innerText;
            btn.innerText = "TERSALIN!";
            setTimeout(() => { btn.innerText = originalText; }, 2000);
        }

        function home() {
            gsap.to("body", { opacity: 0, duration: 0.8, onComplete: () => {
                window.location.href = "wishes-list.html";
            }});
        }
    </script>
</body>
</html>

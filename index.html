<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            /* Background Marmer Hitam (Pure CSS Gradient & Texture) */
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: #d4af37;
            font-family: 'Cinzel', serif; 
            overflow: hidden; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- TEKSTUR MARMER EMAS (ANIMATED) --- */
        .marble-vein {
            position: fixed; inset: 0; pointer-events: none; opacity: 0.3;
            background: url('https://www.transparenttextures.com/patterns/black-linen.png');
        }

        /* --- BINGKAI LINGKARAN EMAS (DARI GAMBAR BOS) --- */
        .gold-ring {
            position: relative; width: 320px; height: 320px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 50%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
            opacity: 0; scale: 0.5;
        }
        .gold-ring::before {
            content: ''; position: absolute; inset: -10px;
            border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 50%;
        }

        /* --- ORNAMEN MANDALA POJOK (HITAM EMAS) --- */
        .mandala {
            position: absolute; width: 150px; height: 150px;
            color: #d4af37; opacity: 0; z-index: 5;
        }
        .m-top { top: -40px; right: -40px; transform: rotate(180deg); }
        .m-bot { bottom: -40px; left: -40px; }

        /* --- TEKS MEWAH --- */
        .title-sub { letter-spacing: 6px; font-size: 0.6rem; margin-bottom: 10px; color: #fff; }
        
        .couple-name {
            font-family: 'Great Vibes', cursive; font-size: 3.5rem;
            background: linear-gradient(to bottom, #f7e1a0 0%, #d4af37 50%, #b8926a 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .guest-box { text-align: center; margin-top: 40px; opacity: 0; }
        
        .guest-name {
            font-family: 'Great Vibes', cursive; color: #fff;
            font-size: 2rem; margin: 10px 0;
        }

        /* --- TOMBOL MINIMALIS (GAK KAKU) --- */
        .btn-buka {
            margin-top: 20px; padding: 10px 40px;
            background: transparent; color: #d4af37;
            border: 1px solid #d4af37; border-radius: 0; /* Kotak Tajam Lebih Mewah */
            font-family: 'Cinzel', serif; font-weight: 700;
            cursor: pointer; transition: 0.5s; overflow: hidden; position: relative;
        }
        .btn-buka:hover { background: #d4af37; color: #000; box-shadow: 0 0 20px rgba(212,175,55,0.4); }

        /* --- EFEK DEBU EMAS (SHIMMER FADE) --- */
        .shimmer-overlay {
            position: fixed; inset: 0; background: #fff;
            z-index: 9999; display: none; opacity: 0;
        }
    </style>
</head>
<body>

    <div class="marble-vein"></div>

    <svg class="mandala m-top" viewBox="0 0 100 100"><path d="M50 0 L60 40 L100 50 L60 60 L50 100 L40 60 L0 50 L40 40 Z" fill="currentColor" opacity="0.5"/></svg>
    <svg class="mandala m-bot" viewBox="0 0 100 100"><path d="M50 0 L60 40 L100 50 L60 60 L50 100 L40 60 L0 50 L40 40 Z" fill="currentColor" opacity="0.5"/></svg>

    <div class="gold-ring" id="ring">
        <p class="title-sub">THE WEDDING OF</p>
        <h1 class="couple-name">Samira & Murad</h1>
        
        <div class="guest-box" id="guest-ui">
            <p style="font-size: 0.6rem; letter-spacing: 2px; color: rgba(255,255,255,0.6);">SPECIAL INVITE FOR:</p>
            <h2 class="guest-name" id="nama-tamu">Tamu Undangan</h2>
            <button class="btn-buka" onclick="shimmerTransition()">ENTER EXPERIENCE</button>
        </div>
    </div>

    <div class="shimmer-overlay" id="shimmer"></div>

    <script>
        // 1. DUKUN TRACKER (Tetap Simpan Nama)
        const params = new URLSearchParams(window.location.search);
        const nama = params.get('to');
        if (nama) {
            document.getElementById('nama-tamu').innerText = decodeURIComponent(nama);
            localStorage.setItem('namaTamu', decodeURIComponent(nama));
        }

        // 2. ANIMASI MASUK (Elegant & Slow)
        window.onload = () => {
            const tl = gsap.timeline();
            tl.to("#ring", { opacity: 1, scale: 1, duration: 2, ease: "power4.out" })
              .to(".mandala", { opacity: 0.3, duration: 1.5, stagger: 0.5 }, "-=1")
              .to("#guest-ui", { opacity: 1, duration: 1 }, "-=0.5");
            
            // Efek Napas Ring
            gsap.to("#ring", { scale: 1.03, duration: 3, repeat: -1, yoyo: true, ease: "sine.inOut" });
        };

        // 3. SHIMMER TRANSITION (Ganti Amplop Kaku)
        function shimmerTransition() {
            const shim = document.getElementById('shimmer');
            shim.style.display = 'block';

            const tl = gsap.timeline();
            tl.to("#ring", { scale: 1.2, opacity: 0, filter: "blur(20px)", duration: 1.5, ease: "power2.in" })
              .to(shim, { opacity: 1, duration: 1 }, "-=1")
              .call(() => {
                  window.location.href = "profil.html";
              });
        }
    </script>
</body>
</html>

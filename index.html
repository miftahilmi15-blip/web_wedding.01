<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: radial-gradient(circle, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- 1. BUNGA MUTER POJOK (ROYAL FLORAL) --- */
        .flower-vinyl {
            position: fixed; bottom: 20px; right: 20px;
            width: 85px; height: 85px; z-index: 50;
            filter: drop-shadow(0 4px 12px rgba(212,175,55,0.4));
        }

        /* --- 2. FRAME PRESISI --- */
        .frame-wrapper {
            position: relative; z-index: 20;
            opacity: 0; scale: 0.9;
        }
        .frame-container {
            width: 320px; height: 550px;
            border: 2px solid #d4af37; 
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px); border-radius: 40px;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 1px solid rgba(212, 175, 55, 0.5);
        }

        /* --- 3. BUNGA BERGUGURAN --- */
        #petal-container {
            position: fixed; inset: 0; z-index: 80; /* Di bawah nama mantul sedikit */
            pointer-events: none;
        }
        .petal {
            position: absolute; color: #fff; font-size: 1.5rem;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.3));
        }

        /* --- 4. NAMA MANTUL-MANTUL (Z-INDEX TERTINGGI) --- */
        .bounce-element {
            position: fixed; white-space: nowrap;
            font-family: 'Great Vibes', cursive;
            color: rgba(139, 94, 131, 0.6); /* Warna lebih tegas tapi tetap soft */
            font-size: 1.8rem; pointer-events: none; 
            z-index: 200; /* DI DEPAN SEMUA ELEMEN */
            display: flex; align-items: center; gap: 8px;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.5);
        }

        .couple-name {
            font-family: 'Great Vibes', cursive; color: #8b5e83;
            font-size: 3.5rem; text-align: center; margin: 20px 0;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .guest-name {
            font-family: 'Great Vibes', cursive; color: #d4af37;
            font-size: 2.2rem; margin: 10px 0;
        }

        .btn-buka {
            margin-top: 30px; padding: 12px 40px; background: #8b5e83;
            color: white; border: none; border-radius: 50px; font-weight: 600;
            cursor: pointer; transition: 0.4s; box-shadow: 0 5px 15px rgba(139,94,131,0.3);
        }
        .btn-buka:hover { scale: 1.1; background: #a6759c; }

        #storm-layer {
            position: fixed; inset: 0; z-index: 9999; 
            pointer-events: none; display: none;
        }
    </style>
</head>
<body>

    <div id="petal-container"></div>
    <div id="storm-layer"></div>

    <div id="bounce1" class="bounce-element">Samira 🌸</div>
    <div id="bounce2" class="bounce-element">Murad 🌺</div>

    <div class="flower-vinyl" id="vinyl">
        <svg viewBox="0 0 100 100">
            <defs>
                <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#f7e1a0;stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#d4af37;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#b8926a;stop-opacity:1" />
                </linearGradient>
            </defs>
            <g fill="url(#goldGrad)">
                <path d="M50 50 Q60 10 50 0 Q40 10 50 50 M50 50 Q90 40 100 50 Q90 60 50 50 M50 50 Q40 90 50 100 Q60 90 50 50 M50 50 Q10 60 0 50 Q10 40 50 50"/>
                <path d="M50 50 Q75 25 85 15 Q65 35 50 50 M50 50 Q75 75 85 85 Q65 65 50 50 M50 50 Q25 75 15 85 Q35 65 50 50 M50 50 Q25 25 15 15 Q35 35 50 50" opacity="0.8"/>
            </g>
            <circle cx="50" cy="50" r="10" fill="white" stroke="#d4af37" stroke-width="1"/>
        </svg>
    </div>

    <div class="frame-wrapper" id="main-frame">
        <div class="frame-container">
            <p style="letter-spacing: 4px; font-size: 0.7rem; color: #8b5e83; font-weight: 600;">THE WEDDING OF</p>
            <h1 class="couple-name" id="shimmer-text">Samira & Murad</h1>

            <div style="text-align: center; margin-top: 20px;">
                <p style="font-size: 0.8rem; color: #8b5e83;">Kepada Yth:</p>
                <h2 class="guest-name" id="nama-tamu">Tamu Undangan</h2>
                <button class="btn-buka" onclick="startStorm()">BUKA UNDANGAN</button>
            </div>
        </div>
    </div>

    <script>
        // 1. DUKUN TRACKER
        const params = new URLSearchParams(window.location.search);
        const nama = params.get('to');
        if (nama) {
            document.getElementById('nama-tamu').innerText = decodeURIComponent(nama);
        }

        // 2. BOUNCING LOGIC (Z-INDEX DEPAN)
        function createBounce(id) {
            const el = document.getElementById(id);
            let rect = el.getBoundingClientRect();
            let pos = { x: Math.random() * (window.innerWidth - 150), y: Math.random() * (window.innerHeight - 50) };
            let vel = { x: (Math.random() > 0.5 ? 2 : -2), y: (Math.random() > 0.5 ? 2 : -2) };

            function update() {
                pos.x += vel.x;
                pos.y += vel.y;

                // Pantulan Dinding
                if (pos.x <= 0 || pos.x + el.offsetWidth >= window.innerWidth) vel.x *= -1;
                if (pos.y <= 0 || pos.y + el.offsetHeight >= window.innerHeight) vel.y *= -1;

                el.style.left = pos.x + 'px';
                el.style.top = pos.y + 'px';
                requestAnimationFrame(update);
            }
            update();
        }

        // 3. GENERATE PETALS
        const petalContainer = document.getElementById('petal-container');
        const petals = ['🌸', '🩷', '🤍' , '🌺'];
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'petal';
            p.innerHTML = petals[Math.floor(Math.random() * petals.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = -50 + 'px';
            petalContainer.appendChild(p);
            gsap.to(p, {
                y: window.innerHeight + 100, x: "+=" + (Math.random() * 100 - 50),
                rotation: 720, duration: Math.random() * 8 + 5, repeat: -1, ease: "none"
            });
        }

        window.onload = () => {
            gsap.to("#main-frame", { opacity: 1, scale: 1, duration: 1.5 });
            gsap.to("#vinyl", { rotate: 360, duration: 10, repeat: -1, ease: "linear" });
            createBounce('bounce1');
            createBounce('bounce2');
        };

        function startStorm() {
            const storm = document.getElementById('storm-layer');
            storm.style.display = 'block';
            for(let i=0; i<60; i++) {
                let div = document.createElement('div');
                div.innerHTML = '🌸';
                div.style.position = 'fixed';
                div.style.left = Math.random() * 100 + 'vw';
                div.style.top = '120vh';
                storm.appendChild(div);
                gsap.to(div, { y: '-130vh', x: "+=" + (Math.random() * 300 - 150), rotation: 1080, duration: 2, ease: "power2.inOut", delay: Math.random() * 0.5 });
            }
            gsap.to("#main-frame", { opacity: 0, scale: 0.8, duration: 1 });
            gsap.to(".bounce-element", { opacity: 0, duration: 0.5 });
            setTimeout(() => { window.location.href = "profil.html"; }, 1800);
        }
    </script>
</body>
</html>

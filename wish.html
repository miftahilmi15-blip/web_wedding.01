<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishes - Samira & Murad</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle, #fce4ec 0%, #f8bbd0 100%); font-family: 'Montserrat', sans-serif; padding: 30px; text-align: center; color: #8b5e83; }
        .form-box { background: rgba(255,255,255,0.4); padding: 20px; border-radius: 20px; margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #d4af37; outline: none; }
        .btn-send { width: 100%; padding: 12px; background: #8b5e83; color: white; border: none; border-radius: 10px; font-weight: bold; }
        .gift-box { border: 2px dashed #d4af37; padding: 20px; border-radius: 20px; background: white; margin-top: 20px; }
        .btn-finish { margin-top: 40px; padding: 10px 20px; background: none; border: 1px solid #8b5e83; color: #8b5e83; border-radius: 50px; font-size: 0.7rem; }
    </style>
</head>
<body>
    <h2>Kirim Doa Restu</h2>
    <div class="form-box">
        <input type="text" placeholder="Nama Anda">
        <textarea placeholder="Tulis ucapan..." rows="4"></textarea>
        <button class="btn-send" onclick="send()">KIRIM UCAPAN 💌</button>
    </div>

    <h3>Kado Digital 🎁</h3>
    <div class="gift-box">
        <p style="font-size: 0.8rem;">Bank Central Asia (BCA)</p>
        <p style="font-weight: bold; font-size: 1.2rem;">1234567890</p>
        <p style="font-size: 0.8rem;">a/n Samira Putri</p>
    </div>

    <button class="btn-finish" onclick="home()">KEMBALI KE DEPAN</button>

    <script>
        function send() { alert('Terima kasih atas doa tulusnya!'); }
        function home() { window.location.href = "index.html"; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Message - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&family=Amiri&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: radial-gradient(circle, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- NAMA MANTUL (DI DEPAN FRAME) --- */
        .bounce-element {
            position: fixed; white-space: nowrap;
            font-family: 'Great Vibes', cursive;
            color: rgba(139, 94, 131, 0.5);
            font-size: 1.8rem; pointer-events: none; 
            z-index: 100; 
            text-shadow: 0 0 10px rgba(255,255,255,0.4);
        }

        /* --- FRAME DASHBOARD (320x560) --- */
        .frame-wrapper {
            position: relative; z-index: 20;
            opacity: 0; transform: scale(0.9);
        }
        .frame-container {
            width: 320px; height: 560px;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(15px); border-radius: 40px;
            display: flex; flex-direction: column; 
            padding: 35px 20px; align-items: center;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 45px rgba(0,0,0,0.08);
            text-align: center;
        }

        .arabic {
            font-family: 'Amiri', serif;
            font-size: 1.25rem; color: #8b5e83; 
            line-height: 2.1; margin: 20px 0;
            opacity: 0;
        }

        .artinya {
            font-size: 0.78rem; color: #6d4c67;
            line-height: 1.7; font-style: italic;
            min-height: 160px; /* Lebih tinggi karena teks lebih panjang */
            margin-bottom: 10px;
        }

        .hint-text {
            font-size: 0.7rem; color: #8b5e83; 
            margin-top: 10px; font-weight: 600;
            opacity: 0;
        }

        .btn-next {
            margin-top: auto; padding: 14px; background: #8b5e83;
            color: white; border: none; border-radius: 50px; 
            font-weight: 600; cursor: pointer; width: 100%; 
            transition: 0.3s; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(139, 94, 131, 0.2);
        }
        .btn-next:hover { background: #a6759c; transform: translateY(-2px); }

    </style>
</head>
<body>

    <div id="bounce1" class="bounce-element">Samira 🌸</div>
    <div id="bounce2" class="bounce-element">Murad 🌺</div>

    <div class="frame-wrapper" id="main-frame">
        <div class="frame-container">
            <p style="letter-spacing: 3px; font-size: 0.65rem; color: #d4af37; font-weight: 700;">AR-RUM : 21</p>
            
            <div class="arabic" id="txtArab">
                وَمِنْ اٰيٰتِهٖٓ اَنْ خَلَقَ لَكُمْ مِّنْ اَنْفُسِكُمْ اَزْوَاجًا لِّتَسْكُنُوْٓا اِلَيْهَا وَجَعَلَ بَيْنَكُمْ مَّوَدَّةً وَّرَحْمَةًۗ اِنَّ فِيْ ذٰلِكَ لَاٰيٰتٍ لِّقَوْمٍ يَّتَفَكَّرُوْنَ
            </div>

            <div class="artinya" id="typewriter"></div>

            <p class="hint-text" id="hint">Sentuhan cinta di setiap kata...</p>

            <button class="btn-next" onclick="nextPage()">NEXT CHAPTER 🩷</button>
        </div>
    </div>

    <script>
        gsap.registerPlugin(TextPlugin);

        function createBounce(id) {
            const el = document.getElementById(id);
            let pos = { 
                x: Math.random() * (window.innerWidth - 120), 
                y: Math.random() * (window.innerHeight - 50) 
            };
            let vel = { x: 1.3, y: 1.3 };

            function update() {
                pos.x += vel.x; pos.y += vel.y;
                if (pos.x <= 0 || pos.x + el.offsetWidth >= window.innerWidth) vel.x *= -1;
                if (pos.y <= 0 || pos.y + el.offsetHeight >= window.innerHeight) vel.y *= -1;
                el.style.left = pos.x + 'px'; el.style.top = pos.y + 'px';
                requestAnimationFrame(update);
            }
            update();
        }

        window.onload = () => {
            const tl = gsap.timeline();
            
            tl.to("#main-frame", { opacity: 1, scale: 1, duration: 1.2, ease: "power4.out" })
              .to("#txtArab", { opacity: 1, y: -5, duration: 1 }, "-=0.5")
              .to("#typewriter", {
                  duration: 7, // Durasi sedikit lebih lama karena teks panjang
                  text: "“Di antara tanda-tanda (kebesaran)-Nya ialah bahwa Dia menciptakan pasangan-pasangan untukmu dari (jenis) dirimu sendiri agar kamu merasa tenteram kepadanya. Dia menjadikan di antaramu rasa cinta dan kasih sayang. Sesungguhnya pada yang demikian itu benar-benar terdapat tanda-tanda (kebesaran Allah) bagi kaum yang berpikir.”",
                  ease: "none"
              })
              .to("#hint", { opacity: 1, duration: 1 })
              .to(".btn-next", { scale: 1.05, repeat: -1, yoyo: true, duration: 0.8, ease: "sine.inOut" });

            createBounce('bounce1');
            createBounce('bounce2');
        };

        function nextPage() {
            gsap.to("#main-frame, .bounce-element", { opacity: 0, duration: 0.8, ease: "power3.in" });
            setTimeout(() => {
                window.location.href = "mempelai.html";
            }, 800);
        }
    </script>
</body>
</html>

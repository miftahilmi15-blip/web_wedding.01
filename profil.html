<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Message - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&family=Amiri&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: radial-gradient(circle, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- EFEK BUNGA JATUH --- */
        .flower {
            position: fixed; top: -10%;
            font-size: 1.5rem; pointer-events: none;
            z-index: 5; opacity: 0.6;
        }

        /* --- NAMA MELAYANG --- */
        .bounce-element {
            position: fixed; white-space: nowrap;
            font-family: 'Great Vibes', cursive;
            color: #8b5e83;
            font-size: 2rem; pointer-events: none; 
            z-index: 100; 
            text-shadow: 0 0 15px rgba(255,255,255,0.6);
            opacity: 0.7;
        }

        .frame-wrapper {
            position: relative; z-index: 20;
        }

        .frame-container {
            width: 320px; height: 560px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px); border-radius: 40px;
            display: flex; flex-direction: column; 
            padding: 40px 25px; align-items: center;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 45px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        .corner {
            position: absolute; width: 40px; height: 40px; border-color: #ec407a; border-style: solid; opacity: 0.3;
        }
        .top-right { top: 15px; right: 15px; border-width: 2px 2px 0 0; border-radius: 0 15px 0 0; }
        .bottom-left { bottom: 15px; left: 15px; border-width: 0 0 2px 2px; border-radius: 0 0 0 15px; }

        .arabic {
            font-family: 'Amiri', serif;
            font-size: 1.25rem; color: #8b5e83; 
            line-height: 2.1; margin: 25px 0;
            min-height: 100px;
        }

        .artinya {
            font-size: 0.8rem; color: #6d4c67;
            line-height: 1.8; font-style: italic;
            min-height: 160px;
        }

        .btn-next {
            position: fixed; bottom: 60px;
            padding: 15px 45px; background: #ec407a;
            color: white; border: none; border-radius: 50px; 
            font-weight: 600; cursor: pointer; z-index: 110;
            box-shadow: 0 8px 20px rgba(236, 64, 122, 0.4);
            display: none; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <audio id="weddingAudio" loop>
        <source src="rum.mp3" type="audio/mpeg">
    </audio>

    <div id="bounce1" class="bounce-element">Samira</div>
    <div id="bounce2" class="bounce-element">Murad</div>

    <div class="frame-wrapper" id="main-frame" style="opacity: 0;">
        <div class="frame-container">
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <p style="letter-spacing: 4px; font-size: 0.7rem; color: #ad1457; font-weight: 800; text-transform: uppercase;">Ar-Rum : 21</p>
            <div class="arabic" id="txtArab"></div>
            <div class="artinya" id="typewriter"></div>
        </div>
    </div>

    <button class="btn-next" id="btnNext" onclick="nextPage()">NEXT CHAPTER 🩷</button>

    <script>
        gsap.registerPlugin(TextPlugin);
        let isBouncing = true;

        function createFlower() {
            const flowers = ['🌸', '🌺', '🍃', '🌹', '✨'];
            const flower = document.createElement('div');
            flower.className = 'flower';
            flower.innerText = flowers[Math.floor(Math.random() * flowers.length)];
            flower.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(flower);
            gsap.to(flower, {
                y: '110vh', x: (Math.random() - 0.5) * 250, rotation: Math.random() * 720,
                duration: 6 + Math.random() * 4, ease: "none", onComplete: () => flower.remove()
            });
        }
        setInterval(createFlower, 400);

        function createBounce(id) {
            const el = document.getElementById(id);
            let pos = { x: Math.random() * (window.innerWidth - 100), y: Math.random() * (window.innerHeight - 50) };
            let vel = { x: 1.2, y: 1.2 };
            function update() {
                if (!isBouncing) return;
                pos.x += vel.x; pos.y += vel.y;
                if (pos.x <= 0 || pos.x + el.offsetWidth >= window.innerWidth) vel.x *= -1;
                if (pos.y <= 0 || pos.y + el.offsetHeight >= window.innerHeight) vel.y *= -1;
                el.style.left = pos.x + 'px'; el.style.top = pos.y + 'px';
                requestAnimationFrame(update);
            }
            update();
        }

        window.onload = () => {
            const audio = document.getElementById('weddingAudio');
            const startPlay = () => {
                audio.play().catch(() => {});
                window.removeEventListener('click', startPlay);
                window.removeEventListener('touchstart', startPlay);
            };
            window.addEventListener('click', startPlay);
            window.addEventListener('touchstart', startPlay);

            createBounce('bounce1');
            createBounce('bounce2');

            const tl = gsap.timeline();
            tl.to("#main-frame", { opacity: 1, duration: 1.5 });

            tl.to("#txtArab", {
                duration: 10,
                text: "وَمِنْ اٰيٰتِهٖٓ اَنْ خَلَقَ لَكُمْ مِّنْ اَنْفُسِكُمْ اَزْوَاجًا لِّتَسْكُنُوْٓا اِلَيْهَا وَجَعَلَ بَيْنَكُمْ مَّوَدَّةً وَّرَحْمَةًۗ اِنَّ فِيْ ذٰلِكَ لَاٰيٰتٍ Lِّقَوْمٍ يَّتَفَكَّرُوْنَ",
                ease: "none"
            });

            tl.to("#typewriter", {
                duration: 18, 
                text: "“Dan di antara tanda-tanda (kebesaran)-Nya ialah Dia menciptakan pasangan-pasangan untukmu dari jenismu sendiri, agar kamu cenderung dan merasa tenteram kepadanya, dan Dia menjadikan di antaramu rasa kasih dan sayang. Sesungguhnya pada yang demikian itu benar-benar terdapat tanda-tanda bagi kaum yang berpikir.”",
                ease: "none"
            });

            tl.add(() => {
                isBouncing = false;
                
                // Samira ke Tengah Presisi
                gsap.to("#bounce1", { 
                    left: "50%", top: "45%", 
                    xPercent: -50, yPercent: -50, 
                    fontSize: "2.8rem", opacity: 1, duration: 2, ease: "power3.out",
                    onComplete: () => {
                        document.getElementById("bounce1").innerHTML = "Samira & Murad";
                        gsap.set("#bounce2", { display: "none" }); // Hilangkan Murad yang satunya
                    }
                });
                
                // Murad Mendekat lalu menghilang (digabung ke bounce1)
                gsap.to("#bounce2", { 
                    left: "50%", top: "45%", 
                    xPercent: -50, yPercent: -50, 
                    opacity: 0, duration: 1.5, ease: "power3.out"
                });

                gsap.to(".frame-container", { opacity: 0, scale: 0.8, duration: 1.5 });
            });

            tl.to("#btnNext", { 
                display: "block",
                opacity: 1, 
                y: -10, 
                duration: 1,
                onStart: () => { gsap.set("#btnNext", { opacity: 0, y: 20 }); }
            }, "+=1");
        };

        function nextPage() {
            gsap.to("body", { opacity: 0, duration: 1 });
            setTimeout(() => { window.location.href = "mempelai.html"; }, 1000);
        }
    </script>
</body>
</html>

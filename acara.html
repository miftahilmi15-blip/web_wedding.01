<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save The Date - Samira & Murad</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle, #fce4ec 0%, #f8bbd0 100%); font-family: 'Montserrat', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8b5e83; padding: 20px; }
        .card { width: 100%; max-width: 350px; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(15px); border-radius: 30px; border: 1.5px solid #d4af37; padding: 30px; margin-bottom: 20px; opacity: 0; transform: scale(0.9); }
        h2 { font-family: 'Great Vibes', cursive; font-size: 2.2rem; margin-bottom: 10px; color: #d4af37; }
        .info { font-size: 0.9rem; line-height: 1.8; margin-bottom: 15px; }
        .btn-maps { display: inline-block; padding: 10px 20px; background: #8b5e83; color: white; text-decoration: none; border-radius: 50px; font-size: 0.8rem; font-weight: 600; margin-top: 10px; }
        .nav-btn { position: fixed; bottom: 30px; padding: 12px 40px; background: #d4af37; color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card" id="akad">
        <h2>Akad Nikah</h2>
        <div class="info">
            <p>📅 Minggu, 17 Mei 2026</p>
            <p>⏰ 08.00 - 10.00 WIB</p>
            <p>📍 Masjid Agung Al-Barakah</p>
        </div>
    </div>
    <div class="card" id="resepsi">
        <h2>Resepsi</h2>
        <div class="info">
            <p>📅 Minggu, 17 Mei 2026</p>
            <p>⏰ 11.00 - Selesai</p>
            <p>📍 Grand Ballroom Mulia</p>
        </div>
        <a href="https://maps.google.com" class="btn-maps">Buka Google Maps 📍</a>
    </div>
    <button class="nav-btn" onclick="next()">LIHAT MOMENT KAMI 📸</button>
    <script>
        gsap.to("#akad", { opacity: 1, scale: 1, duration: 1, delay: 0.3 });
        gsap.to("#resepsi", { opacity: 1, scale: 1, duration: 1, delay: 0.6 });
        function next() { window.location.href = "galeri.html"; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Devkia & Miftah</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top left, #ffdbe8, #f8bbd0 40%, #f3a6c3 100%);
            position: relative;
        }

        /* Background Glow (Statis, tidak gerak) */
        body::before, body::after {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .35;
        }

        body::before { background: #fff; top: -100px; left: -100px; }
        body::after { background: #ffc1d6; bottom: -100px; right: -100px; }

        /* Sparkles (Masih gerak pelan agar hidup) */
        .sparkles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
        .sparkles span {
            position: absolute; width: 4px; height: 4px; background: white;
            border-radius: 50%; opacity: .6; animation: floatSpark 10s linear infinite;
        }
        @keyframes floatSpark { from { transform: translateY(100vh); } to { transform: translateY(-10vh); } }

        /* MAIN CARD (Statis, tidak zoom-zoom) */
        .main-wrapper {
            width: 340px;
            height: 560px;
            position: relative;
            z-index: 10;
        }

        .frame-container {
            width: 100%;
            height: 100%;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.32);
            backdrop-filter: blur(22px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 60px rgba(122, 40, 80, 0.18);
            padding: 40px 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .frame-container::before {
            content: "";
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
        }

        /* LIGHT SWEEP (Tetap ada tapi tidak menghalangi klik) */
        .frame-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 120%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            animation: sweep 7s infinite;
            pointer-events: none; /* PENTING: Supaya tombol bisa dipencet */
        }
        @keyframes sweep { to { left: 150%; } }

        .top-text { margin-top: 20px; }
        .wedding-label { letter-spacing: 7px; font-size: .7rem; color: #ad1457; font-weight: 900; margin-bottom: 20px; }
        .couple-name { font-family: 'Great Vibes', cursive; color: #ad1457; font-size: 4rem; line-height: 1; text-shadow: 0 3px 10px rgba(255, 255, 255, 0.5); }
        .divider { width: 120px; height: 1px; background: linear-gradient(to right, transparent, #ad1457, transparent); margin: 20px auto; }

        .guest-section { margin-bottom: 40px; }
        .guest-label { font-size: .8rem; color: #7a4c62; margin-bottom: 10px; }
        #nama-tamu { font-family: 'Great Vibes', cursive; color: #ad1457; font-size: 2.6rem; margin-bottom: 25px; }

        .btn-buka {
            padding: 14px 40px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #ec407a, #ad1457);
            color: #fff;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 12px 25px rgba(236, 64, 122, .3);
            transition: .4s;
            position: relative;
            z-index: 20; /* Pastikan tombol di atas layer lain */
        }
        .btn-buka:hover { transform: translateY(-3px); box-shadow: 0 16px 35px rgba(236, 64, 122, .45); }
    </style>
</head>
<body>
    <div class="sparkles" id="sparkles"></div>
    <div class="main-wrapper">
        <div class="frame-container">
            <div class="top-text">
                <p class="wedding-label">THE WEDDING OF</p>
                <h1 class="couple-name">Devkia<br>&<br>Miftah</h1>
                <div class="divider"></div>
            </div>

            <div class="guest-section">
                <p class="guest-label">Kepada Yth:</p>
                <h2 id="nama-tamu">Tamu Undangan</h2>
                <button class="btn-buka" onclick="bukaUndangan()">BUKA UNDANGAN</button>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const nama = params.get('to');
        if(nama) { document.getElementById('nama-tamu').innerText = decodeURIComponent(nama); }

        for(let i = 0; i < 35; i++){
            let s = document.createElement('span');
            s.style.left = Math.random() * 100 + '%';
            s.style.animationDuration = (Math.random() * 6 + 5) + 's';
            s.style.animationDelay = Math.random() * 5 + 's';
            document.getElementById('sparkles').appendChild(s);
        }

        gsap.from(".main-wrapper", { opacity: 0, y: 40, duration: 1.8, ease: "power3.out" });
        gsap.from(".couple-name", { opacity: 0, scale: .8, delay: .6, duration: 1.5 });

        function bukaUndangan(){
            gsap.to(".main-wrapper", { 
                opacity: 0, 
                scale: 1.15, 
                duration: .9, 
                ease: "power2.inOut", 
                onComplete: () => { window.location.href = "profil.html"; }
            });
        }
    </script>
</body>
</html>

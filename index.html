<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Invitation - Devkia & Miftah</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600;900&family=Amiri&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle, #fce4ec 0%, #f8bbd0 100%); font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; }
        .page-section { position: absolute; inset: 0; display: none; justify-content: center; align-items: center; z-index: 20; }
        .page-section.active { display: flex; }
        
        /* Frame Style */
        .frame-wrapper { width: 90%; max-width: 350px; }
        .frame-container { width: 100%; min-height: 500px; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px); border-radius: 40px; display: flex; flex-direction: column; padding: 40px 25px; align-items: center; border: 2px solid rgba(255, 255, 255, 0.5); box-shadow: 0 20px 45px rgba(0,0,0,0.05); text-align: center; }
        
        /* Ar-Rum Style */
        .arabic { font-family: 'Amiri', serif; font-size: 1.2rem; color: #8b5e83; line-height: 2; margin: 20px 0; direction: rtl; }
        .artinya { font-size: 0.85rem; color: #6d4c67; line-height: 1.7; font-style: italic; }
        
        /* UI Elements */
        .btn-buka { padding: 15px 40px; background: linear-gradient(45deg, #ec407a, #ad1457); color: white; border: none; border-radius: 50px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        #storm-layer { position: fixed; inset: 0; z-index: 9999; pointer-events: none; display: none; }
        .bounce-element { position: absolute; font-family: 'Great Vibes', cursive; color: #ad1457; font-size: 1.6rem; z-index: 100; }
    </style>
</head>
<body>

    <div id="storm-layer"></div>

    <section id="opener-section" class="page-section active">
        <div class="frame-wrapper" id="opener-wrapper">
            <div class="frame-container">
                <p>The Wedding Of</p>
                <h1>Devkia & Miftah</h1>
                <h2 id="nama-tamu">Tamu Undangan</h2>
                <button class="btn-buka" onclick="startStorm()">Buka Undangan</button>
            </div>
        </div>
    </section>

    <section id="profil-section" class="page-section">
        <div class="frame-wrapper">
            <div class="frame-container">
                <p style="font-size: 0.6rem;">Ar-Rum : 21</p>
                <div class="arabic" id="txtArab"></div>
                <div class="artinya" id="typewriter"></div>
            </div>
        </div>
    </section>

    <script>
        gsap.registerPlugin(TextPlugin);

        function startStorm() {
            // Animasi Storm Bunga
            const storm = document.getElementById('storm-layer');
            storm.style.display = 'block';
            for(let i=0; i<30; i++) {
                let div = document.createElement('div');
                div.innerHTML = '🌸';
                div.style.position = 'fixed'; div.style.left = '50vw'; div.style.top = '50vh';
                storm.appendChild(div);
                gsap.to(div, { x: (Math.random()-0.5)*1000, y: (Math.random()-0.5)*1000, opacity: 0, duration: 2, onComplete: () => div.remove() });
            }

            // Ganti Halaman
            gsap.to("#opener-section", { opacity: 0, duration: 1, onComplete: () => {
                document.getElementById('opener-section').classList.remove('active');
                document.getElementById('profil-section').classList.add('active');
                initProfilAnimations();
            }});
        }

        function initProfilAnimations() {
            gsap.to("#txtArab", { duration: 4, text: "وَمِنْ اٰيٰتِهٖٓ اَنْ خَلَقَ لَكُمْ مِّنْ اَنْفُسِكُمْ اَزْوَاجًا لِّتَسْكُنُوْٓا اِلَيْهَا وَجَعَلَ بَيْنَكُمْ مَّوَدَّةً وَّرَحْمَةًۗ اِنَّ فِيْ ذٰلِكَ لَاٰيٰتٍ لِّقَوْمٍ يَّتَفَكَّرُوْنَ", ease: "none" });
            gsap.to("#typewriter", { duration: 6, text: "“Dan di antara tanda-tanda (kebesaran)-Nya ialah Dia menciptakan pasangan-pasangan untukmu dari jenismu sendiri...”", ease: "none" });
        }
    </script>
</body>
</html>

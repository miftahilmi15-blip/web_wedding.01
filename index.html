<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Devkia & Miftah</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: radial-gradient(circle, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* --- 1. BUNGA JATUH DI BACKGROUND --- */
        .falling-flowers-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .flower {
            position: absolute;
            top: -10%;
            color: rgba(236, 64, 122, 0.4);
            font-size: 1.5rem;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* --- CONTAINER UTAMA --- */
        .main-wrapper {
            position: relative;
            width: 320px; height: 550px;
            z-index: 20;
        }

        .bounce-area {
            position: absolute;
            top: -60px; left: 0; width: 100%; height: 100px;
            z-index: 100; pointer-events: none;
        }
        .bounce-element {
            position: absolute; white-space: nowrap;
            font-family: 'Great Vibes', cursive;
            color: #8b5e83; font-size: 1.5rem;
            text-shadow: 0 2px 5px rgba(255, 255, 255, 0.8);
        }

        .frame-container {
            width: 100%; height: 100%;
            border: 1px solid rgba(212, 175, 55, 0.5);
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px); border-radius: 40px;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            position: relative; z-index: 30;
        }

        .flower-vinyl {
            position: absolute; bottom: 20px; right: 20px;
            width: 85px; height: 85px; z-index: 50;
        }

        .couple-name {
            font-family: 'Great Vibes', cursive; color: #8b5e83;
            font-size: 3.2rem; text-align: center; margin: 20px 0;
        }

        .guest-name {
            font-family: 'Great Vibes', cursive; color: #d4af37;
            font-size: 2.2rem; margin: 10px 0;
        }

        .btn-buka {
            margin-top: 30px; padding: 12px 40px; background: #8b5e83;
            color: white; border: none; border-radius: 50px; font-weight: 600;
            cursor: pointer; transition: 0.4s; box-shadow: 0 5px 15px rgba(139,94,131,0.3);
        }

        #storm-layer {
            position: fixed; inset: 0; z-index: 9999; 
            pointer-events: none; display: none;
        }
    </style>
</head>
<body>

    <audio id="weddingAudio" loop>
        <source src="musik-kamu.mp3" type="audio/mpeg">
    </audio>

    <div id="storm-layer"></div>

    <div class="falling-flowers-container" id="flowers-bg"></div>

    <div class="main-wrapper">
        <div class="bounce-area">
            <div id="bounce1" class="bounce-element">Devkia 🌸</div>
            <div id="bounce2" class="bounce-element">Miftah 🌺</div>
        </div>

        <div class="frame-container" id="main-frame">
            <p style="letter-spacing: 4px; font-size: 0.7rem; color: #8b5e83; font-weight: 600;">THE WEDDING OF</p>
            <h1 class="couple-name">Samira & Murad</h1>

            <div style="text-align: center; margin-top: 20px;">
                <p style="font-size: 0.8rem; color: #8b5e83;">Kepada Yth:</p>
                <h2 class="guest-name" id="nama-tamu">Tamu Undangan</h2>
                <button class="btn-buka" onclick="startStorm()">BUKA UNDANGAN</button>
            </div>

            <div class="flower-vinyl" id="vinyl">
                <svg viewBox="0 0 100 100">
                    <path fill="#d4af37" d="M50 50 Q60 10 50 0 Q40 10 50 50 M50 50 Q90 40 100 50 Q90 60 50 50 M50 50 Q40 90 50 100 Q60 90 50 50 M50 50 Q10 60 0 50 Q10 40 50 50"/>
                    <circle cx="50" cy="50" r="10" fill="white" stroke="#d4af37"/>
                </svg>
            </div>
        </div>
    </div>

    <script>
        // 1. Logika Bunga Jatuh di Background
        function createFlowers() {
            const container = document.getElementById('flowers-bg');
            const flowerEmojis = ['🌸', '🌺', '🌹', '🍃', '✨'];
            for (let i = 0; i < 25; i++) {
                const flower = document.createElement('div');
                flower.className = 'flower';
                flower.innerText = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
                flower.style.left = Math.random() * 100 + 'vw';
                flower.style.animationDelay = Math.random() * 10 + 's';
                flower.style.animationDuration = (Math.random() * 5 + 5) + 's';
                container.appendChild(flower);
            }
        }

        // 2. Ambil Nama dari URL
        const params = new URLSearchParams(window.location.search);
        const nama = params.get('to');
        if (nama) document.getElementById('nama-tamu').innerText = decodeURIComponent(nama);

        // 3. Logika Bounce Nama
        function createBounce(id) {
            const el = document.getElementById(id);
            const container = document.querySelector('.bounce-area');
            let pos = { x: Math.random() * (container.offsetWidth - 80), y: Math.random() * 30 };
            let vel = { x: 0.8, y: 0.5 };

            function update() {
                pos.x += vel.x; pos.y += vel.y;
                if (pos.x <= 0 || pos.x + el.offsetWidth >= container.offsetWidth) vel.x *= -1;
                if (pos.y <= 0 || pos.y + el.offsetHeight >= container.offsetHeight) vel.y *= -1;
                el.style.left = pos.x + 'px'; el.style.top = pos.y + 'px';
                requestAnimationFrame(update);
            }
            update();
        }

        window.onload = () => {
            gsap.from(".main-wrapper", { opacity: 0, scale: 0.9, duration: 1.5 });
            gsap.to("#vinyl", { rotate: 360, duration: 10, repeat: -1, ease: "linear" });
            createFlowers();
            createBounce('bounce1');
            createBounce('bounce2');
        };

        // 4. Buka Undangan (DI SINI YANG TADI MACET)
        function startStorm() {
            const audio = document.getElementById('weddingAudio');
            audio.play().catch(e => console.log("Audio play blocked"));

            document.getElementById('flowers-bg').style.display = 'none';
            const storm = document.getElementById('storm-layer');
            storm.style.display = 'block';

            const stormEmojis = ['🌸', '🌺', '🌹'];

            for(let i=0; i<40; i++) {
                let div = document.createElement('div');
                // PERBAIKAN: Pilih satu emoji secara acak
                div.innerHTML = stormEmojis[Math.floor(Math.random() * stormEmojis.length)];
                div.style.position = 'fixed';
                div.style.left = '50vw';
                div.style.top = '50vh';
                div.style.fontSize = '2rem';
                storm.appendChild(div);
                
                gsap.to(div, { 
                    x: (Math.random() - 0.5) * window.innerWidth * 1.5, 
                    y: (Math.random() - 0.5) * window.innerHeight * 1.5, 
                    rotation: 720, 
                    duration: 2, 
                    opacity: 0, 
                    ease: "power2.out" 
                });
            }

            gsap.to(".main-wrapper", { opacity: 0, scale: 1.2, duration: 1, ease: "power2.in" });

            setTimeout(() => { 
                window.location.href = "profil.html"; 
            }, 1500);
        }
    </script>
</body>
</html>

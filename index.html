<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Invitation - Devkia & Miftah</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: radial-gradient(circle, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- BACKGROUND FLOWERS --- */
        .falling-flowers-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
        }
        .flower {
            position: absolute; top: -10%; color: rgba(236, 64, 122, 0.4);
            font-size: 1.5rem; animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* --- WRAPPER UTAMA (Pusat Segala Sesuatu) --- */
        .main-wrapper {
            position: relative;
            width: 300px; /* Lebar card */
            height: 480px; /* Tinggi card */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        /* --- BOUNCE AREA (Menempel di atas Frame) --- */
        .bounce-area {
            position: absolute;
            top: -60px; /* Jarak bounce di atas card */
            width: 100%; height: 60px;
            pointer-events: none;
            overflow: visible;
        }
        .bounce-element {
            position: absolute; white-space: nowrap; font-family: 'Great Vibes', cursive;
            color: #8b5e83; font-size: 1.5rem; text-shadow: 0 2px 5px rgba(255, 255, 255, 0.8);
        }

        /* --- FRAME CONTAINER (Kartu Undangan) --- */
        .frame-container {
            width: 100%; height: 100%;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px); border-radius: 30px;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        .header-text { letter-spacing: 4px; font-size: 0.7rem; color: #8b5e83; font-weight: 900; margin-bottom: 5px; }
        .couple-name { font-family: 'Great Vibes', cursive; color: #8b5e83; font-size: 2.8rem; text-align: center; line-height: 1.1; margin-bottom: 20px; }
        .guest-section { text-align: center; }
        .guest-label { font-size: 0.75rem; color: #8b5e83; letter-spacing: 1px; }
        .guest-name { font-family: 'Great Vibes', cursive; color: #d4af37; font-size: 2.2rem; margin: 10px 0; }
        
        .btn-buka {
            padding: 12px 35px; background: #8b5e83; color: white; border: none; 
            border-radius: 50px; font-weight: 600; cursor: pointer; 
            transition: 0.3s; box-shadow: 0 5px 15px rgba(139,94,131,0.3);
            margin-top: 15px;
        }

        .flower-vinyl { position: absolute; bottom: 15px; right: 15px; width: 60px; height: 60px; opacity: 0.7; }
        #storm-layer { position: fixed; inset: 0; z-index: 9999; pointer-events: none; display: none; }
    </style>
</head>
<body>

    <audio id="weddingAudio" loop><source src="musik-kamu.mp3" type="audio/mpeg"></audio>

    <div id="storm-layer"></div>
    <div class="falling-flowers-container" id="flowers-bg"></div>

    <div class="main-wrapper">
        <div class="bounce-area">
            <div id="bounce1" class="bounce-element">Devkia 🌸</div>
            <div id="bounce2" class="bounce-element">Miftah 🌺</div>
        </div>

        <div class="frame-container">
            <div>
                <p class="header-text">THE WEDDING OF</p>
                <h1 class="couple-name">Devkia<br>&<br>Miftah</h1>
            </div>

            <div class="guest-section">
                <p class="guest-label">Kepada Yth:</p>
                <h2 class="guest-name" id="nama-tamu">Tamu Undangan</h2>
                <button class="btn-buka" onclick="startStorm()">BUKA UNDANGAN</button>
            </div>

            <div class="flower-vinyl" id="vinyl">
                <svg viewBox="0 0 100 100"><path fill="#d4af37" d="M50 50 Q60 10 50 0 Q40 10 50 50 M50 50 Q90 40 100 50 Q90 60 50 50 M50 50 Q40 90 50 100 Q60 90 50 50 M50 50 Q10 60 0 50 Q10 40 50 50"/><circle cx="50" cy="50" r="10" fill="white" stroke="#d4af37"/></svg>
            </div>
        </div>
    </div>

    <script>
        function createFlowers() {
            const container = document.getElementById('flowers-bg');
            const flowerEmojis = ['🌸', '🌺', '🌹', '🍃', '✨'];
            for (let i = 0; i < 20; i++) {
                const flower = document.createElement('div');
                flower.className = 'flower';
                flower.innerText = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
                flower.style.left = Math.random() * 100 + 'vw';
                flower.style.animationDelay = Math.random() * 8 + 's';
                flower.style.animationDuration = (Math.random() * 5 + 5) + 's';
                container.appendChild(flower);
            }
        }

        const params = new URLSearchParams(window.location.search);
        const nama = params.get('to');
        if (nama) document.getElementById('nama-tamu').innerText = decodeURIComponent(nama);

        function createBounce(id) {
            const el = document.getElementById(id);
            const container = document.querySelector('.bounce-area');
            let pos = { x: Math.random() * 50, y: Math.random() * 20 };
            let vel = { x: 0.6, y: 0.4 };
            function update() {
                pos.x += vel.x; pos.y += vel.y;
                if (pos.x <= 0 || pos.x + el.offsetWidth >= container.offsetWidth) vel.x *= -1;
                if (pos.y <= 0 || pos.y + el.offsetHeight >= container.offsetHeight) vel.y *= -1;
                el.style.left = pos.x + 'px'; el.style.top = pos.y + 'px';
                requestAnimationFrame(update);
            }
            update();
        }

        window.onload = () => {
            gsap.from(".main-wrapper", { opacity: 0, scale: 0.9, duration: 1.5 });
            gsap.to("#vinyl", { rotate: 360, duration: 10, repeat: -1, ease: "linear" });
            createFlowers();
            createBounce('bounce1');
            createBounce('bounce2');
        };

        function startStorm() {
            document.getElementById('weddingAudio').play().catch(e => console.log("Audio blocked"));
            document.getElementById('flowers-bg').style.display = 'none';
            const storm = document.getElementById('storm-layer');
            storm.style.display = 'block';
            for(let i=0; i<30; i++) {
                let div = document.createElement('div');
                div.innerHTML = ['🌸', '🌺', '🌹'][Math.floor(Math.random()*3)];
                div.style.position = 'fixed'; div.style.left = '50vw'; div.style.top = '50vh';
                div.style.fontSize = '2rem'; storm.appendChild(div);
                gsap.to(div, { x: (Math.random()-0.5)*800, y: (Math.random()-0.5)*800, rotation: 720, duration: 2, opacity: 0 });
            }
            gsap.to(".main-wrapper", { opacity: 0, scale: 1.5, duration: 1 });
            setTimeout(() => { window.location.href = "profil.html"; }, 1500);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Message - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&family=Amiri&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: radial-gradient(circle, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- NAMA MANTUL (Ciri Khas) --- */
        .bounce-element {
            position: fixed; white-space: nowrap;
            font-family: 'Great Vibes', cursive;
            color: rgba(139, 94, 131, 0.3);
            font-size: 1.8rem; pointer-events: none; 
            z-index: 5;
        }

        /* --- FRAME DASHBOARD (Presisi 320x550) --- */
        .frame-wrapper {
            position: relative; z-index: 20;
            opacity: 0; transform: scale(0.9);
        }
        .frame-container {
            width: 320px; height: 560px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px); border-radius: 40px;
            display: flex; flex-direction: column; 
            padding: 35px 25px; align-items: center;
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 20px 45px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Ayat Arab */
        .arabic {
            font-family: 'Amiri', serif;
            font-size: 1.3rem; color: #8b5e83; 
            line-height: 2.2; margin: 20px 0;
            opacity: 0;
        }

        /* Terjemahan (Typewriter) */
        .artinya {
            font-size: 0.8rem; color: #6d4c67;
            line-height: 1.8; font-style: italic;
            min-height: 80px; margin-bottom: 15px;
        }

        /* Image Gate (Clean & Circle) */
        .gate-container {
            width: 140px; height: 140px;
            margin: 15px 0; opacity: 0;
        }
        .gate-img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover;
            filter: drop-shadow(0 8px 15px rgba(139, 94, 131, 0.2));
        }

        /* Tombol Pro */
        .btn-next {
            margin-top: auto; padding: 14px; background: #8b5e83;
            color: white; border: none; border-radius: 50px; 
            font-weight: 600; cursor: pointer; width: 100%; 
            transition: 0.3s; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(139, 94, 131, 0.3);
        }
        .btn-next:hover { background: #a6759c; transform: translateY(-2px); }

        .deco-flower { position: absolute; font-size: 1.5rem; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="bounce1" class="bounce-element">Samira 🌸</div>
    <div id="bounce2" class="bounce-element">Murad 🌺</div>

    <div class="frame-wrapper" id="main-frame">
        <div class="frame-container">
            <p style="letter-spacing: 3px; font-size: 0.65rem; color: #d4af37; font-weight: 700;">AR-RUM : 21</p>
            
            <div class="arabic" id="txtArab">
                وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا لِّتَسْكُنُوا إِلَيْهَا وَجَعَلَ بَيْنَكُم مَّوَدَّةً وَرَحْمَةً
            </div>

            <div class="artinya" id="typewriter"></div>

            <div class="gate-container" id="gate">
                <img src="https://images.unsplash.com/photo-1523438885200-e635ba2c371e?q=80&w=500" class="gate-img" alt="Wedding Gate">
            </div>

            <p style="font-size: 0.7rem; color: #8b5e83; margin-bottom: 15px; font-weight: 600;" id="hint">Sentuhan cinta di setiap kata...</p>

            <button class="btn-next" onclick="nextPage()">NEXT CHAPTER 🩷</button>
        </div>
    </div>

    <script>
        gsap.registerPlugin(TextPlugin);

        // 1. Logika Nama Mantul
        function createBounce(id) {
            const el = document.getElementById(id);
            let pos = { x: Math.random() * (window.innerWidth - 100), y: Math.random() * (window.innerHeight - 50) };
            let vel = { x: 1.2, y: 1.2 };
            function update() {
                pos.x += vel.x; pos.y += vel.y;
                if (pos.x <= 0 || pos.x + el.offsetWidth >= window.innerWidth) vel.x *= -1;
                if (pos.y <= 0 || pos.y + el.offsetHeight >= window.innerHeight) vel.y *= -1;
                el.style.left = pos.x + 'px'; el.style.top = pos.y + 'px';
                requestAnimationFrame(update);
            }
            update();
        }

        window.onload = () => {
            const tl = gsap.timeline();
            
            // Animasi Frame Masuk
            tl.to("#main-frame", { opacity: 1, scale: 1, duration: 1.2, ease: "power4.out" })
              .to("#txtArab", { opacity: 1, y: -5, duration: 1 }, "-=0.5")
              
              // Efek Ngetik Terjemahan
              .to("#typewriter", {
                  duration: 4.5,
                  text: "“Dan di antara tanda-tanda kebesaran-Nya ialah Dia menciptakan pasangan untukmu agar kamu merasa tenteram kepadanya...”",
                  ease: "none"
              })
              
              // Munculkan Gambar
              .to("#gate", { opacity: 1, scale: 1.1, duration: 1.2, ease: "back.out(1.7)" }, "-=1")
              
              // Animasi Tombol Berdenyut (Pulse)
              .to(".btn-next", { scale: 1.05, repeat: -1, yoyo: true, duration: 0.8, ease: "sine.inOut" });

            createBounce('bounce1');
            createBounce('bounce2');
        };

        function nextPage() {
            gsap.to("#main-frame", { opacity: 0, y: -50, duration: 0.8, ease: "power3.in" });
            setTimeout(() => {
                window.location.href = "mempelai.html";
            }, 800);
        }
    </script>
</body>
</html>

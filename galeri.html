<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey - Devkia & Miftah</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f3a6c3);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #4a148c; /* Ungu gelap elegan */
            position: relative;
        }

        /* Aesthetic overlay */
        .overlay {
            position: absolute; inset: 0;
            background: rgba(255,255,255,0.2);
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 450px;
            padding: 20px;
        }

        .header-title {
            font-family: 'Great Vibes', cursive;
            font-size: 3.2rem;
            color: #880e4f;
            opacity: 0;
            margin-bottom: 5px;
        }

        .divider {
            width: 0; height: 1px;
            background: #880e4f;
            margin-bottom: 40px;
            opacity: 0;
        }

        /* Box Cerita Aesthetic */
        .story-box {
            width: 100%;
            min-height: 120px; /* Ditinggikan biar teks panjang muat */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px;
        }

        .type-text {
            font-size: 1.05rem;
            line-height: 1.8;
            font-weight: 300;
            letter-spacing: 0.5px;
            color: #553366;
            font-style: italic;
        }

        /* Gallery */
        .gallery-container {
            margin-top: 40px;
            width: 280px;
            height: 300px;
            position: relative;
            display: none;
        }

        .img-box {
            position: absolute; width: 180px; height: 230px;
            background: white; padding: 10px 10px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-radius: 2px; opacity: 0;
            transition: 0.5s;
        }

        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .img1 { left: 0; top: 20px; transform: rotate(-6deg); }
        .img2 { left: 50px; top: 0px; transform: rotate(0deg); z-index: 2; }
        .img3 { left: 100px; top: 20px; transform: rotate(6deg); }

        .btn-container { position: fixed; bottom: 40px; opacity: 0; z-index: 100; }
        .nav-btn {
            padding: 12px 30px; border: 1px solid #880e4f; border-radius: 0;
            background: transparent; color: #880e4f;
            font-weight: 600; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; font-size: 0.75rem;
            transition: 0.3s;
        }
        .nav-btn:hover { background: #880e4f; color: white; }
    </style>
</head>
<body>

    <div class="overlay"></div>
    
    <div class="content">
        <div class="header-title" id="title">Our Story</div>
        <div class="divider" id="divider"></div>

        <div class="story-box">
            <p class="type-text" id="typingTarget"></p>
        </div>

        <div class="gallery-container" id="gallery">
            <div class="img-box img1"><img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=500"></div>
            <div class="img-box img2"><img src="https://images.unsplash.com/photo-1520854221256-17451cc331bf?q=80&w=500"></div>
            <div class="img-box img3"><img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=500"></div>
        </div>
    </div>

    <div class="btn-container" id="btnNext">
        <button class="nav-btn" onclick="next()">KIRIM DOA ✨</button>
    </div>

    <script>
        gsap.registerPlugin(TextPlugin);

        // Narasi yang lebih panjang dan mendalam
        const storyLines = [
            "Tak pernah ada dalam rencana kami untuk bertemu.",
            "Namun semesta punya cara indah untuk menyatukan dua hati.",
            "Banyak tawa, diskusi, dan doa yang kita lalui bersama.",
            "Hingga akhirnya kami sadar, kitalah rumah yang dicari.",
            "Perbedaan kini melengkapi, bukan lagi menjadi penghalang.",
            "Kini, kami mantap melangkah ke jenjang yang lebih suci.",
            "Mohon doakan kami agar selalu dalam ridha-Nya selamanya."
        ];

        const tl = gsap.timeline();

        tl.to("#title", { opacity: 1, duration: 1.5 })
          .to("#divider", { opacity: 1, width: 120, duration: 1 }, "-=0.5");

        storyLines.forEach((line) => {
            tl.to("#typingTarget", {
                duration: line.length * 0.06, 
                text: line,
                ease: "none"
            })
            .to({}, { duration: 2.2 }) // Durasi tayang teks
            .to("#typingTarget", {
                opacity: 0,
                duration: 0.5,
                onComplete: () => {
                    document.getElementById("typingTarget").textContent = "";
                    gsap.set("#typingTarget", { opacity: 1 });
                }
            });
        });

        tl.set("#gallery", { display: "block" })
          .to(".img1", { opacity: 1, y: -20, duration: 1, ease: "power2.out" })
          .to(".img2", { opacity: 1, y: -20, duration: 1, ease: "power2.out" }, "-=0.6")
          .to(".img3", { opacity: 1, y: -20, duration: 1, ease: "power2.out" }, "-=0.6")
          .to("#btnNext", { opacity: 1, duration: 1 });

        function next() { window.location.href = "wish.html"; }
    </script>
</body>
</html>

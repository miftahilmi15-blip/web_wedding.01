<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Acara - Samira & Murad</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background: #fce4ec; font-family: 'Montserrat', sans-serif; color: #8b5e83; margin: 0; padding: 40px 20px; }
        h1 { font-family: 'Great Vibes', cursive; font-size: 3rem; margin-bottom: 30px; color: #ad1457; }
        
        .event-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 25px;
            border: 2px solid #f8bbd0;
            box-shadow: 0 10px 20px rgba(173, 20, 87, 0.05);
            opacity: 0; transform: scale(0.9);
        }

        .event-title { 
            font-size: 1.4rem; font-weight: 600; color: #c2185b; 
            margin-bottom: 10px; letter-spacing: 1px;
        }

        .event-info { font-size: 0.9rem; line-height: 1.8; color: #880e4f; }
        .event-info strong { color: #ad1457; }

        .icon { font-size: 2rem; margin-bottom: 10px; display: block; }

        .btn-back {
            margin-top: 20px; padding: 12px 30px;
            background: transparent; border: 2px solid #ec407a;
            color: #ec407a; border-radius: 50px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .btn-back:hover { background: #ec407a; color: white; }
    </style>
</head>
<body>

    <h1>Save The Date</h1>

    <div class="event-card" id="akad">
        <span class="icon">💍</span>
        <div class="event-title">AKAD NIKAH</div>
        <div class="event-info">
            <strong>Minggu, 12 Juli 2026</strong><br>
            Pukul 08.00 - 10.00 WIB<br>
            Masjid Raya Al-Barokah<br>
            Jl. Melati No. 123, Cirebon
        </div>
    </div>

    <div class="event-card" id="resepsi">
        <span class="icon">🌸</span>
        <div class="event-title">RESEPSI</div>
        <div class="event-info">
            <strong>Minggu, 12 Juli 2026</strong><br>
            Pukul 11.00 - 14.00 WIB<br>
            Gedung Grand Rose Ballroom<br>
            Kawasan Bunga Indah, Cirebon
        </div>
    </div>

    <button class="btn-back" onclick="history.back()">KEMBALI</button>

    <script>
        // Animasi muncul berurutan
        gsap.to("#akad", { opacity: 1, scale: 1, duration: 1, delay: 0.3, ease: "power2.out" });
        gsap.to("#resepsi", { opacity: 1, scale: 1, duration: 1, delay: 0.6, ease: "power2.out" });
    </script>
</body>
</html>
